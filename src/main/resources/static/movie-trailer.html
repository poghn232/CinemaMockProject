<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>MovieZone | Watch</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #020617;
        color: #e5e7eb;
        font-family:
          "Poppins",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 18px;
        background: rgba(15, 23, 42, 0.98);
        box-shadow: 0 1px 0 rgba(148, 163, 184, 0.35);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-logo {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 20%, #f97316, #e11d48 55%, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }
      .brand-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .back-link {
        font-size: 13px;
        color: #9ca3af;
        text-decoration: none;
      }
      .back-link:hover {
        color: #e5e7eb;
      }
      .player-shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 16px 28px;
        gap: 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        text-align: center;
      }
      .frame-wrap {
        width: 100%;
        max-width: 1100px;
        aspect-ratio: 16 / 9;
        background: #020617;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 26px 55px rgba(0, 0, 0, 0.85);
        border: 1px solid rgba(55, 65, 81, 0.9);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .msg {
        font-size: 14px;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">
        <div class="brand-logo">MZ</div>
        <div class="brand-title">MovieZone Player</div>
      </div>
      <a href="javascript:history.back()" class="back-link">← Back</a>
    </header>

    <main class="player-shell">
      <div id="trailerTitle" class="title">Loading film...</div>
      <div class="frame-wrap" id="frameWrap">
        <div class="msg" id="frameMessage">Loading...</div>
      </div>
    </main>

    <script>
      function toEmbedUrl(url) {
        if (!url) return null;
        let u = url.trim();
        // Already an embed url
        if (u.includes("/embed/")) return u;
        // youtu.be/ID
        const shortMatch = u.match(/https?:\/\/youtu\.be\/([^?&]+)/i);
        if (shortMatch) return "https://www.youtube.com/embed/" + shortMatch[1];
        // youtube.com/watch?v=ID
        const watchMatch = u.match(/[?&]v=([^&]+)/i);
        if (watchMatch) return "https://www.youtube.com/embed/" + watchMatch[1];
        return u;
      }

      async function loadTrailer() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const type = params.get("type") || "movie";
        if (!id) {
          document.getElementById("frameMessage").textContent =
            "Missing movie id.";
          return;
        }

        // Optional: require login
        const token = localStorage.getItem("token");
        if (!token) {
          const go = confirm(
            "Bạn cần đăng nhập để xem phim. Chuyển tới trang đăng nhập?",
          );
          if (go) window.location.href = "login.html";
          return;
        }

        try {
          const res = await fetch(
            `/api/public/movies/detail?type=${encodeURIComponent(
              type,
            )}&id=${encodeURIComponent(id)}`,
          );
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();
          renderTrailer(data);
        } catch (e) {
          console.error(e);
          document.getElementById("frameMessage").textContent =
            "Không tải được thông tin phim.";
        }
      }

      function renderTrailer(d) {
        const titleEl = document.getElementById("trailerTitle");
        if (titleEl) {
          titleEl.textContent = d.title
            ? `Watch · ${d.title}`
            : "Watch film";
        }
        document.title = d.title
          ? `MovieZone | Watch · ${d.title}`
          : "MovieZone | Watch";

        const wrap = document.getElementById("frameWrap");
        wrap.innerHTML = "";

        if (!d.src) {
          const msg = document.createElement("div");
          msg.className = "msg";
          msg.textContent = "Nguồn phim chưa được cấu hình cho nội dung này.";
          wrap.appendChild(msg);
          return;
        }

        const embed = toEmbedUrl(d.src);
        const iframe = document.createElement("iframe");
        iframe.src = embed;
        iframe.allow =
          "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        wrap.appendChild(iframe);
      }

      loadTrailer();
    </script>
  </body>
</html>
