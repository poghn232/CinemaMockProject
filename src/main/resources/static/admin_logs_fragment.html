<style>
  .logs-wrapper { display: flex; flex-direction: column; gap: 16px; }

  /* ── Toolbar ── */
  .logs-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .logs-search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .logs-search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    opacity: 0.45;
  }

  .logs-search {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border-radius: 10px;
    border: 1px solid rgba(148,163,184,0.22);
    background: rgba(15,23,42,0.85);
    color: #e5e7eb;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .logs-search:focus { border-color: #f97316; }
  .logs-search::placeholder { color: #6b7280; }

  .logs-count-badge {
    font-size: 12px;
    color: #9ca3af;
    white-space: nowrap;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    border: 1px solid rgba(148,163,184,0.15);
  }

  .logs-refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 9px;
    border: 1px solid rgba(148,163,184,0.2);
    background: transparent;
    color: #e5e7eb;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .logs-refresh-btn:hover { background: rgba(249,115,22,0.12); border-color: #f97316; color: #f97316; }
  .logs-refresh-btn svg { transition: transform 0.4s; }
  .logs-refresh-btn.spinning svg { transform: rotate(360deg); }

  /* ── Table ── */
  .logs-table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.18);
  }

  .logs-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .logs-table thead tr {
    background: rgba(249,115,22,0.08);
    border-bottom: 1px solid rgba(148,163,184,0.18);
  }

  .logs-table th {
    padding: 11px 14px;
    text-align: left;
    color: #9ca3af;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    white-space: nowrap;
    user-select: none;
  }

  .logs-table th.sortable { cursor: pointer; }
  .logs-table th.sortable:hover { color: #f97316; }
  .logs-table th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  .logs-table th.sort-asc .sort-arrow::after  { content: " ▲"; opacity: 1; color: #f97316; }
  .logs-table th.sort-desc .sort-arrow::after { content: " ▼"; opacity: 1; color: #f97316; }

  .logs-table tbody tr {
    border-bottom: 1px solid rgba(148,163,184,0.07);
    transition: background 0.12s;
  }
  .logs-table tbody tr:last-child { border-bottom: none; }
  .logs-table tbody tr:hover { background: rgba(249,115,22,0.04); }

  .logs-table td {
    padding: 11px 14px;
    color: #e5e7eb;
    vertical-align: middle;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .logs-table td.id-cell {
    color: #6b7280;
    font-family: monospace;
    font-size: 12px;
  }

  .logs-table td.time-cell {
    color: #94a3b8;
    font-size: 12px;
    white-space: nowrap;
  }

  .log-level {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .log-level.info    { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .log-level.warn    { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .log-level.error   { background: rgba(239,68,68,0.15);  color: #f87171; }
  .log-level.success { background: rgba(16,185,129,0.15); color: #34d399; }
  .log-level.debug   { background: rgba(139,92,246,0.15); color: #a78bfa; }

  /* ── Empty / loading states ── */
  .logs-state {
    text-align: center;
    padding: 48px 20px;
    color: #6b7280;
    font-size: 14px;
  }

  .logs-state svg { display: block; margin: 0 auto 12px; opacity: 0.35; }

  /* ── Pagination ── */
  .logs-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .page-info { font-size: 12px; color: #6b7280; }

  .page-controls { display: flex; align-items: center; gap: 6px; }

  .page-btn {
    min-width: 32px;
    height: 32px;
    padding: 0 8px;
    border-radius: 8px;
    border: 1px solid rgba(148,163,184,0.18);
    background: transparent;
    color: #9ca3af;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.14s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page-btn:hover:not(:disabled) { border-color: #f97316; color: #f97316; }
  .page-btn.active { background: linear-gradient(135deg,#f97316,#ec4899); color: white; border-color: transparent; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-size-select {
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid rgba(148,163,184,0.18);
    background: rgba(15,23,42,0.9);
    color: #9ca3af;
    font-size: 12px;
    cursor: pointer;
  }
</style>

<div class="card logs-wrapper">

  <!-- header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div>
      <h2 style="font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        Admin Logs
      </h2>
      <p class="muted" style="margin-top:3px;font-size:12px;">History system logs</p>
    </div>
  </div>

  <!-- toolbar -->
  <div class="logs-toolbar">
    <div class="logs-search-wrap">
      <input id="logsSearch" class="logs-search" type="text" placeholder="Tìm theo username, action, IP…" autocomplete="off"/>
    </div>
    <span class="logs-count-badge" id="logsCountBadge">-- log</span>
    <button class="logs-refresh-btn" id="logsRefreshBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
    <select class="page-size-select" id="logsPageSize" title="Rows per page">
      <option value="10">10 / page</option>
      <option value="20" selected>20 / page</option>
      <option value="50">50 / page</option>
      <option value="100">100 / page</option>
    </select>
  </div>

  <!-- table -->
  <div class="logs-table-wrap" id="logsTableWrap">
    <div class="logs-state" id="logsState">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Loading logs...
    </div>
    <table class="logs-table" id="logsTable" style="display:none;">
      <thead>
        <tr id="logsHeaderRow"></tr>
      </thead>
      <tbody id="logsBody"></tbody>
    </table>
  </div>

  <!-- pagination -->
  <div class="logs-pagination" id="logsPagination" style="display:none;">
    <span class="page-info" id="logsPageInfo"></span>
    <div class="page-controls" id="logsPageControls"></div>
  </div>

</div>

<script data-fragment-script>
  (function () {
  /* ─── state ─── */
  let allLogs    = [];
  let filtered   = [];
  let currentPage = 1;
  let sortCol    = 'logId';
  let sortDir    = 'desc';
  const PAGE_SIZE = () => parseInt(document.getElementById('logsPageSize').value, 10);

  /* ─── DOM refs ─── */
  const searchEl   = document.getElementById('logsSearch');
  const countBadge = document.getElementById('logsCountBadge');
  const state      = document.getElementById('logsState');
  const table      = document.getElementById('logsTable');
  const headerRow  = document.getElementById('logsHeaderRow');
  const body       = document.getElementById('logsBody');
  const pagination = document.getElementById('logsPagination');
  const pageInfo   = document.getElementById('logsPageInfo');
  const pageCtrl   = document.getElementById('logsPageControls');
  const refreshBtn = document.getElementById('logsRefreshBtn');
  const pageSizeEl = document.getElementById('logsPageSize');

  /* ─── column config: detect automatically + pretty labels ─── */
  const LABEL_MAP = {
    logId:          'ID',
    username:    'Username',
    action:      'Action',
    level:       'Level',
    message:     'Message',
    details:     'Details',
    ipAddress:   'IP Address',
    ip:          'IP Address',
    endpoint:    'Endpoint',
    method:      'Method',
    status:      'Status',
    createdAt:   'Thời gian',
    timestamp:   'Thời gian',
    loginTime:   'Thời gian',
    updatedAt:   'Cập nhật',
    region:      'Region',
    countryCode: 'Country',
  };

  /* fields to render as level badge */
  const LEVEL_FIELDS = new Set(['level','status','method']);

  /* fields treated as timestamps */
  const TIME_FIELDS = new Set(['createdAt','timestamp','loginTime','updatedAt','time','at']);
  /* ─── helpers ─── */
  function fmt(key, val) {
    if (val === null || val === undefined) return '<span style="opacity:.3">—</span>';

    if (TIME_FIELDS.has(key)) {
      try {
        // Cắt microseconds xuống còn milliseconds
        const normalized = String(val).replace(/(\.\d{3})\d+/, '$1');
        const d = new Date(normalized);
        if (!isNaN(d.getTime())) {
          const hours   = String(d.getHours()).padStart(2, '0');
          const minutes = String(d.getMinutes()).padStart(2, '0');
          const day     = String(d.getDate()).padStart(2, '0');
          const month   = String(d.getMonth() + 1).padStart(2, '0');
          const year    = d.getFullYear();
          return `${hours}:${minutes} - ${day}/${month}/${year}`;
        }
      } catch(_) {}
    }

    const str = String(val);

    if (LEVEL_FIELDS.has(key)) {
      const v = str.toLowerCase();
      const cls =
        v === 'error' || v === '500' ? 'error' :
        v === 'warn'  || v === 'warning' ? 'warn' :
        v === 'info'  || v === '200' || v === '201' || v === 'success' ? (key === 'status' ? 'success' : 'info') :
        v === 'debug' ? 'debug' :
        v === 'get'   ? 'info' :
        v === 'post'  ? 'success' :
        v === 'put'   ? 'warn' :
        v === 'delete'? 'error' : 'info';
      return `<span class="log-level ${cls}">${str}</span>`;
    }

    return `<span title="${str.replace(/"/g,'&quot;')}">${str.length > 60 ? str.slice(0,60)+'…' : str}</span>`;
  }

  function buildColumns(logs) {
    if (!logs.length) return [];
    const keys = Object.keys(logs[0]);
    // put id first, time last
    const priority = ['logId','id','username','action','level','message','method','endpoint','ipAddress','ip','region','countryCode','details','status'];
    const timeLast  = [...TIME_FIELDS];
    const sorted = [
      ...priority.filter(k => keys.includes(k)),
      ...keys.filter(k => !priority.includes(k) && !TIME_FIELDS.has(k)),
      ...timeLast.filter(k => keys.includes(k)),
    ];
    return [...new Set(sorted)].filter(k => keys.includes(k));
  }

  /* ─── render ─── */
  function render() {
    if (!allLogs.length) return;

    const cols = buildColumns(allLogs);

    /* header */
    headerRow.innerHTML = cols.map(k => {
      const label = LABEL_MAP[k] || k;
      const isActive = sortCol === k;
      const cls = `sortable${isActive ? ' sort-' + sortDir : ''}`;
      return `<th class="${cls}" data-col="${k}">${label}<span class="sort-arrow"></span></th>`;
    }).join('');

    /* attach sort listeners */
    headerRow.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col; sortDir = 'desc';
        }
        currentPage = 1;
        applyFilterSort();
      });
    });

    renderBody(cols);
  }

  function applyFilterSort() {
    const q = searchEl.value.trim().toLowerCase();
    filtered = q
      ? allLogs.filter(log => Object.values(log).some(v => String(v ?? '').toLowerCase().includes(q)))
      : [...allLogs];

    if (sortCol) {
      filtered.sort((a, b) => {
        const va = a[sortCol] ?? '';
        const vb = b[sortCol] ?? '';
        const cmp = String(va).localeCompare(String(vb), undefined, { numeric: true });
        return sortDir === 'asc' ? cmp : -cmp;
      });
    }

    countBadge.textContent = `${filtered.length} / ${allLogs.length} logs`;
    renderBody(buildColumns(allLogs));
    renderPagination();
  }

  function renderBody(cols) {
    const ps   = PAGE_SIZE();
    const start = (currentPage - 1) * ps;
    const page  = filtered.slice(start, start + ps);

    if (!page.length) {
      body.innerHTML = `<tr><td colspan="${cols.length}" class="logs-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Cannot find any result
      </td></tr>`;
      return;
    }

    body.innerHTML = page.map(log => `<tr>${cols.map(k => {
      const isId   = k === 'id';
      const isTime = TIME_FIELDS.has(k);
      const cls    = isId ? 'id-cell' : isTime ? 'time-cell' : '';
      return `<td class="${cls}">${fmt(k, log[k])}</td>`;
    }).join('')}</tr>`).join('');
  }

  function renderPagination() {
    const ps    = PAGE_SIZE();
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / ps));

    if (total === 0) { pagination.style.display = 'none'; return; }
    pagination.style.display = 'flex';

    const from = (currentPage - 1) * ps + 1;
    const to   = Math.min(currentPage * ps, total);
    pageInfo.textContent = `Displaying ${from}–${to} of ${total} logs`;

    /* build page buttons (max 7 visible) */
    const btns = [];
    const addBtn = (label, page, active = false, disabled = false) => {
      btns.push(`<button class="page-btn${active?' active':''}" ${disabled?'disabled':''} data-page="${page}">${label}</button>`);
    };

    addBtn('‹', currentPage - 1, false, currentPage === 1);

    const delta = 2;
    const left  = currentPage - delta;
    const right = currentPage + delta;
    let prevWasEllipsis = false;

    for (let p = 1; p <= pages; p++) {
      if (p === 1 || p === pages || (p >= left && p <= right)) {
        addBtn(p, p, p === currentPage);
        prevWasEllipsis = false;
      } else if (!prevWasEllipsis) {
        btns.push('<span style="color:#4b5563;padding:0 4px">…</span>');
        prevWasEllipsis = true;
      }
    }

    addBtn('›', currentPage + 1, false, currentPage === pages);

    pageCtrl.innerHTML = btns.join('');
    pageCtrl.querySelectorAll('.page-btn[data-page]').forEach(b => {
      b.addEventListener('click', () => {
        const p = parseInt(b.dataset.page, 10);
        if (p < 1 || p > pages) return;
        currentPage = p;
        renderBody(buildColumns(allLogs));
        renderPagination();
      });
    });
  }

  /* ─── fetch ─── */
  async function fetchLogs() {
    state.innerHTML = `
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Loading logs`;
    state.style.display = 'block';
    table.style.display = 'none';
    pagination.style.display = 'none';

    refreshBtn.classList.add('spinning');

    try {
      const token = localStorage.getItem('token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const res = await fetch('/api/admin/logs/all', { headers });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      allLogs = await res.json();
      filtered = [...allLogs];
      currentPage = 1;

      if (!allLogs.length) {
        state.innerHTML = `
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          No logs yet.`;
        countBadge.textContent = '0 logs';
        return;
      }

      state.style.display = 'none';
      table.style.display  = 'table';

      countBadge.textContent = `${allLogs.length} logs`;
      render();
      applyFilterSort();

    } catch (err) {
      state.innerHTML = `
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.4">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span style="color:#f87171">Cannot load logs</span><br>
        <span style="font-size:12px;color:#6b7280">${err.message}</span>`;
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  /* ─── events ─── */
  let searchTimer;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; applyFilterSort(); }, 150);
  });

  refreshBtn.addEventListener('click', fetchLogs);

  pageSizeEl.addEventListener('change', () => { currentPage = 1; applyFilterSort(); });

  /* ─── init ─── */
  fetchLogs();
})();
</script>
