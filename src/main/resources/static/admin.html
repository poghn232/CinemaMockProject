<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>MovieZone | Admin</title>
    <style>
      /* Shared admin styles extracted from original admin.html */
      :root {
        --bg-primary: #020617;
        --accent: #f97316;
        --text-main: #e5e7eb;
        --text-subtle: #9ca3af;
        --border-soft: rgba(148, 163, 184, 0.45);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Poppins",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at 0 0,
            rgba(255, 255, 255, 0.06),
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(37, 99, 235, 0.3),
            transparent 60%
          ),
          linear-gradient(135deg, #020617, #030712 50%, #020617);
        color: var(--text-main);
        min-height: 100vh;
      }
      .page-shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 20px 28px 48px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        border-radius: 18px;
        background:
          radial-gradient(
            circle at 0 0,
            rgba(148, 163, 184, 0.35),
            transparent 58%
          ),
          rgba(15, 23, 42, 0.96);
        box-shadow:
          0 0 0 1px rgba(148, 163, 184, 0.45),
          0 18px 40px rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(18px);
        position: sticky;
        top: 12px;
        z-index: 20;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .nav-logo {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: radial-gradient(
          circle at 30% 20%,
          #f97316,
          #e11d48 55%,
          #4f46e5
        );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(248, 113, 113, 0.55);
        font-size: 14px;
        font-weight: 700;
      }
      .nav-title {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .nav-title-main {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
      }
      .nav-title-sub {
        font-size: 11px;
        color: var(--text-subtle);
      }
      .nav-center {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
        margin-right: 10px;
      }
      .nav-link {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 999px;
        color: var(--text-subtle);
        text-decoration: none;
        border: 1px solid transparent;
        transition: all 0.16s ease;
        cursor: pointer;
        background: transparent;
      }
      .nav-link:hover {
        color: var(--text-main);
        border-color: rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.9);
      }
      .nav-link.active {
        background: linear-gradient(135deg, #f97316, #ec4899);
        color: white;
        border-color: transparent;
        box-shadow:
          0 12px 22px rgba(248, 113, 113, 0.6),
          0 0 0 1px rgba(248, 113, 113, 0.7);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .nav-username {
        color: var(--text-subtle);
      }
      .nav-button {
        padding: 7px 13px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        background: rgba(15, 23, 42, 0.9);
        color: var(--text-main);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.16s ease;
      }
      .nav-button-primary {
        border: none;
        background: linear-gradient(135deg, #f97316, #ec4899);
        color: white;
        font-weight: 600;
      }

      .layout {
        display: flex;
        gap: 20px;
        margin-top: 26px;
      }
      .sidebar {
        position: sticky;
        width: 260px;
        top: 100px; /* same offset as navbar */
        align-self: flex-start;
        height: fit-content;
      }
      .side-section {
        background: rgba(15, 23, 42, 0.95);
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .stat-label {
        color: var(--text-subtle);
        font-size: 13px;
      }
      .stat-value {
        font-weight: 700;
        font-size: 18px;
      }
      .side-menu {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .side-item {
        text-align: left;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--text-main);
        cursor: pointer;
      }
      .side-item:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .content {
        flex: 1;
        width: 280px;
      }
      .card {
        background: rgba(15, 23, 42, 0.95);
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--border-soft);
      }
      .muted {
        color: var(--text-subtle);
        font-size: 13px;
      }

      .users-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .user-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.02);
      }
      .user-meta {
        display: flex;
        flex-direction: column;
      }
      .user-name {
        font-weight: 600;
      }
      .user-email {
        font-size: 12px;
        color: var(--text-subtle);
      }

      .toggle {
        position: relative;
        width: 46px;
        height: 26px;
        background: rgba(148, 163, 184, 0.12);
        border-radius: 999px;
        cursor: pointer;
        padding: 3px;
      }
      .toggle .knob {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        transition: transform 0.16s ease;
      }
      .toggle.on {
        background: linear-gradient(135deg, #10b981, #34d399);
      }
      .toggle.on .knob {
        transform: translateX(20px);
      }

      .packs {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .pack-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.02);
      }
      .pack-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      input[type="text"],
      input[type="number"],
      select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: var(--text-main);
      }

      /* Remove default browser style */
      select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        cursor: pointer;
      }

      /* Style dropdown items */
      select option {
        background: #0f172a;
        color: #e5e7eb;
      }
      .btn {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      .btn.ghost {
        background: transparent;
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      @media (max-width: 1000px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
      }
    </style>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body>
    <div class="page-shell">
      <div class="navbar">
        <div class="nav-left">
          <div class="nav-logo">MZ</div>
          <div class="nav-title">
            <div class="nav-title-main">MovieZone Admin</div>
            <div class="nav-title-sub">Manage users & packs</div>
          </div>
        </div>
        <div class="nav-center">
          <a class="nav-link active" href="/admin.html">Home</a>
        </div>
        <div class="nav-right">
          <div class="nav-username">
            Welcome <span id="usernameDisplay"></span>
          </div>
          <button id="logoutBtn" class="nav-button nav-button-primary">
            Sign out
          </button>
        </div>
      </div>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <div class="side-section">
            <div class="stat">
              <div class="stat-label">Users (non-admin)</div>
              <div class="stat-value" id="countUsers">--</div>
            </div>
            <div class="stat">
              <div class="stat-label">Subscription packs</div>
              <div class="stat-value" id="countPacks">--</div>
            </div>
            <div class="stat">
              <div class="stat-label">Published films</div>
              <div class="stat-value" id="countFilms">--</div>
            </div>
          </div>
          <nav class="side-menu">
            <button class="side-item" data-fragment="admin_home_fragment.html">
              Home
            </button>
            <button class="side-item" data-fragment="admin_users.html">
              Users
            </button>
            <button class="side-item" data-fragment="admin_packs.html">
              Packs
            </button>
            <button class="side-item" data-fragment="admin_movies.html">
              Films
            </button>
          </nav>
        </aside>

        <main class="content" id="content">
          <!-- dynamic content loaded here -->
          <div class="card">
            <h2>Loading...</h2>
          </div>
        </main>
      </div>
    </div>

    <script>
      // Shared admin JS: loads fragments and provides APIs for user/pack/film screens
      const api = {
        users: "/api/admin/users",
        packs: "/api/packs",
        movies: "/api/admin/movies",
      };

      async function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("token");
        const headers = Object.assign({}, opts.headers || {});
        if (token) headers["Authorization"] = "Bearer " + token;
        const res = await fetch(url, Object.assign({}, opts, { headers }));
        if (!res.ok) throw new Error(res.status + " " + (await res.text()));
        const txt = await res.text();
        return txt ? JSON.parse(txt) : null;
      }

      function titleCase(s) {
        if (!s) return s;
        return s
          .split(" ")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }
      function formatPrice(v) {
        if (v == null) return "";
        const n = parseFloat(v);
        if (isNaN(n)) return v;
        return n.toFixed(2);
      }

      // load fragment into #content
      async function loadFragment(url) {
        const content = document.getElementById("content");
        content.innerHTML = '<div class="card"><h2>Loading...</h2></div>';
        try {
          // add Authorization header if token exists (matches fetchJson behavior)
          const token = localStorage.getItem("token");
          const headers = {};
          if (token) headers["Authorization"] = "Bearer " + token;
          const res = await fetch(url, { cache: "no-store", headers });
          if (!res.ok) throw new Error(res.status + " " + res.statusText);
          const html = await res.text();
          content.innerHTML = html;
          // if the fragment includes a <script type="module" data-fragment-script> tag, evaluate it
          const dummy = document.createElement("div");
          dummy.innerHTML = html;
          const scripts = dummy.querySelectorAll(
            "script[data-fragment-script]",
          );
          scripts.forEach((s) => {
            try {
              new Function(s.textContent)();
            } catch (e) {
              console.error("fragment script error", e);
            }
          });
        } catch (e) {
          content.innerHTML =
            '<div class="card"><h2>Failed to load</h2><div class="muted">' +
            String(e) +
            "</div></div>";
          console.error(e);
        }
      }

      // update counts
      async function refreshCounts() {
        try {
          const users = (await fetchJson(api.users)) || [];
          const packs = (await fetchJson(api.packs)) || [];
          const films = (await fetchJson(api.movies)) || [];
          const nonAdmin = (users || []).filter(
            (u) => u.role !== "ADMIN",
          ).length;
          document.getElementById("countUsers").textContent = nonAdmin;
          document.getElementById("countPacks").textContent = (
            packs || []
          ).length;
          document.getElementById("countFilms").textContent = (
            films || []
          ).length;
        } catch (e) {
          console.error("refreshCounts", e);
        }
      }

      // initial wiring
      document.addEventListener("DOMContentLoaded", () => {
        const logoutBtn = document.getElementById("logoutBtn");

        logoutBtn &&
          logoutBtn.addEventListener("click", () => {
            // remove token
            localStorage.removeItem("token");

            // optional: clear everything
            // localStorage.clear();

            // redirect to login page
            window.location.href = "/login.html";
          });

        const items = document.querySelectorAll(".side-item");
        items.forEach((b) =>
          b.addEventListener("click", (ev) => {
            document
              .querySelectorAll(".side-item")
              .forEach((i) => i.classList.remove("active"));
            b.classList.add("active");
            const frag = b.getAttribute("data-fragment");
            if (frag) loadFragment(frag);
          }),
        );

        const menuToggle = document.getElementById("menuToggle");
        const sidebar = document.getElementById("sidebar");
        menuToggle &&
          menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("collapsed");
          });

        // load home by default
        const homeBtn = document.querySelector(
          '.side-item[data-fragment="admin_home_fragment.html"]',
        );
        if (homeBtn) homeBtn.click();

        refreshCounts();
      });

      const username = localStorage.getItem("username");

      if (username) {
        document.getElementById("usernameDisplay").textContent = username;
      }

      // expose helper functions for fragments
      window.adminApi = {
        fetchJson,
        api,
        titleCase,
        formatPrice,
        refreshCounts,
        loadFragment,
      };

      const footerYear = document.getElementById("footerYear");
      if (footerYear) {
        footerYear.textContent = new Date().getFullYear().toString();
      }
    </script>
  </body>
</html>
