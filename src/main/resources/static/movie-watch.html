                      const tt = tracks.find(
                        (t) =>
                          t && (t.label === "Default" || t.language === "en"),
                      );
                      if (tt) tt.mode = "showing";
                    } catch (e) {}
                  }, 150);
                } catch (e) {
                  console.warn("Failed to attach subtitle track for hls.js", e);
                }
              }
              hls.attachMedia(vid);
            } else {
              console.error("HLS is not supported in this browser");
            }
          } else {
            vid.src = videoUrl;
          }

          vid.addEventListener(
            "loadedmetadata",
            () => {
              if (vid.duration > 0) _durationSec = Math.floor(vid.duration);
              if (start > 0) vid.currentTime = start;
            },
            { once: true },
          );

          if (_firstPlay) {
            _firstPlay = false;
            _doSave();
          }
        } else {
          // Generic embedded iframe
          const container = document.querySelector(".video-container");
          container.innerHTML = `<iframe id="videoPlayer" class="video-player" allowfullscreen
                      src="${start > 0 ? videoUrl + "#t=" + start : videoUrl}">
                   </iframe>`;
          if (_firstPlay) {
            _firstPlay = false;
            _doSave();
          }
        }
      }

      function extractYouTubeId(url) {
        const patterns = [
          /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/,
          /youtube\.com\/embed\/([^&\n?#]+)/,
        ];
        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }
        return null;
      }

      function extractVimeoId(url) {
        const match = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
        return match ? match[1] : null;
      }

      // ── Watch History Tracker ──────────────────────────────────────────

      const _histParams = new URLSearchParams(window.location.search);
      const _histId = _histParams.get("id");
      const _histType = _histParams.get("type") || "movie";
      const _histToken = localStorage.getItem("token");
      const _tParam = _histParams.get("t");

      let _durationSec = 0;
      let _firstPlay = true;

      window._resumeSec = 0;

      window._startHistoryTracker = function (durationSeconds) {
        _durationSec = durationSeconds || 0;
      };

      // ── Current time — works for YouTube, native <video>, and iframes ──
      function _getCurrentTime() {
        try {
          if (_ytPlayer && typeof _ytPlayer.getCurrentTime === "function") {
            return Math.floor(_ytPlayer.getCurrentTime()) || 0;
          }
          if (_nativeVideo) {
            return Math.floor(_nativeVideo.currentTime) || 0;
          }
        } catch (e) {}
        return 0;
      }

      // ── Duration — prefers live player value over stored estimate ──────
      function _getLiveDuration() {
        try {
          if (_ytPlayer && typeof _ytPlayer.getDuration === "function") {
            const d = _ytPlayer.getDuration();
            if (d > 0) return Math.floor(d);
          }
          if (_nativeVideo && _nativeVideo.duration > 0) {
            return Math.floor(_nativeVideo.duration);
          }
        } catch (e) {}
        return _durationSec || 0;
      }

      // ── Resolve which content is currently playing ─────────────────────
      // When a TV episode is switched, _currentMovieId / _currentEpisodeId
      // are updated by setupTVSeries — use those instead of the URL ?id=.
      function _buildPayload() {
        const currentTime = _getCurrentTime();
        const duration = _getLiveDuration();
        if (duration > 0) _durationSec = duration; // keep in sync
        const progress =
          duration > 0 ? Math.min(currentTime, duration) : currentTime;

        // Determine which entity to attach the record to
        if (_histType === "tv") {
          const epId = _currentEpisodeId || parseInt(_histId);
          return {
            progressSec: progress,
            durationSec: duration,
            episodeId: epId,
          };
        } else {
          const mvId = _currentMovieId || parseInt(_histId);
          return {
            progressSec: progress,
            durationSec: duration,
            movieId: mvId,
          };
        }
      }

      function _doSave() {
        if (!_histToken) return;
        const payload = _buildPayload();
        // Need at least one content id
        if (!payload.movieId && !payload.episodeId) return;
        fetch("/api/user/history/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + _histToken,
          },
          body: JSON.stringify(payload),
        }).catch(() => {});
      }

      // Periodic save every 15 s — fires for all player types once playing has started
      setInterval(() => {
        if (!_firstPlay) _doSave();
      }, 15_000);

      // Save on tab/browser close (synchronous XHR — sendBeacon can't set Auth header)
      window.addEventListener("beforeunload", () => {
        if (_firstPlay || !_histToken) return;
        const payload = _buildPayload();
        if (!payload.movieId && !payload.episodeId) return;
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/user/history/save", false);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + _histToken);
        try {
          xhr.send(JSON.stringify(payload));
        } catch (e) {}
      });

      async function _initAndStart() {
        if (_tParam !== null && _tParam !== "") {
          window._resumeSec = parseFloat(_tParam) || 0;
        }

        // Load saved progress from DB to resume from where the user left off
        if (_histId && _histToken) {
          try {
            const res = await fetch("/api/user/history", {
              headers: { Authorization: "Bearer " + _histToken },
            });
            if (res.ok) {
              const list = await res.json();
              // For TV, _histId is the series ID. Match history by the ?episode= param (episode DB id).
              const _episodeParam = _histParams.get("episode");
              const rec = list.find(
                (h) =>
                  (_histType === "movie" &&
                    String(h.movieId) === String(_histId)) ||
                  (_histType === "tv" &&
                    _episodeParam &&
                    String(h.episodeId) === String(_episodeParam)),
              );
              if (rec) {
                const savedPos = rec.progressSec || 0;
                if (rec.durationSec > 0) _durationSec = rec.durationSec;
                if (!window._resumeSec) window._resumeSec = savedPos;
              }
            }
          } catch (e) {
            console.warn("Could not load saved progress:", e);
          }
        }
        loadWatchPage();
      }

      // --- Subtitle upload helpers ---
      function srtToVtt(srtText) {
        // Simple converter: normalize line endings, add VTT header, and
        // convert any SRT timecode commas to dots on lines containing -->
        try {
          const normalized = srtText
            .replace(/\r\n/g, "\n")
            .replace(/\r/g, "\n");
          const lines = normalized.split("\n");
          const out = ["WEBVTT", ""];
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.indexOf("-->") !== -1) {
              // replace comma with dot in timecodes and collapse extra spaces
              const fixed = line.replace(/,/g, ".").replace(/\s+/g, " ").trim();
              out.push(fixed);
            } else {
              out.push(line);
            }
          }
          return out.join("\n");
        } catch (e) {
          console.warn("srtToVtt failed", e);
          return null;
        }
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = (e) => reject(e);
          reader.readAsText(file);
        });
      }

      function attachRemoteSubtitleToVideo(url, lang) {
        try {
          // if url seems like a proxy api (/api/public/movies/subtitle/...), use as-is
          const finalUrl = url;

          if (_nativeVideo) {
            // remove existing non-custom tracks
            Array.from(_nativeVideo.querySelectorAll("track")).forEach((t) => {
              // do not remove data: URL custom tracks (they contain 'data:'), these are user-uploaded
              if (t.src && !t.src.startsWith("data:")) t.remove();
            });
            const t = document.createElement("track");
            t.kind = "subtitles";
            t.label = lang || "subtitle";
            t.srclang = lang || "en";
            t.src = finalUrl;
            t.default = true;
            _nativeVideo.appendChild(t);
            // record the active remote subtitle URL so ads restore it
            _currentSubtitleUrl = finalUrl;
          } else {
            // if no native video, try to replace tracks inside videoPlayer (iframe case unsupported)
            const vidEl = document.getElementById("videoPlayer");
            if (vidEl && vidEl.tagName === "VIDEO") {
              Array.from(vidEl.querySelectorAll("track")).forEach((t) => {
                if (t.src && !t.src.startsWith("data:")) t.remove();
              });
              const t = document.createElement("track");
              t.kind = "subtitles";
              t.label = lang || "subtitle";
              t.srclang = lang || "en";
              t.src = finalUrl;
              t.default = true;
              vidEl.appendChild(t);
              // record the active remote subtitle URL so ads restore it
              _currentSubtitleUrl = finalUrl;
            } else {
              console.warn(
                "attachRemoteSubtitleToVideo: no native video element available to attach track",
              );
            }
          }
        } catch (e) {
          console.warn("attachRemoteSubtitleToVideo error", e);
        }
      }

      // Wire up input handlers
      (function setupSubtitleUploadHandlers() {
        const input = document.getElementById("subtitleFileInput");
        const clearBtn = document.getElementById("clearCustomSubtitle");
        const status = document.getElementById("subtitleStatus");

        function updateUi() {
          const stored = _getStoredCustomSubtitle();
          if (stored) {
            clearBtn.style.display = "inline-flex";
            status.textContent = "Using uploaded subtitle.";
          } else if (_currentSubtitleUrl) {
            clearBtn.style.display = "none";
            status.textContent = "Using default subtitle.";
          } else {
            clearBtn.style.display = "none";
            status.textContent = "No subtitles available.";
          }
        }

        if (input) {
          input.addEventListener("change", async (e) => {
            const file = input.files && input.files[0];
            if (!file) return;
            status.textContent = "Processing subtitle...";
            try {
              const text = await fileToDataUrl(file);
              // text is the file content (string). Determine type by extension
              const name = file.name || "";
              let vtt = null;
              if (/\.vtt$/i.test(name) || /text\/vtt/.test(file.type)) {
                vtt = text;
              } else if (
                /\.srt$/i.test(name) ||
                /subtitle|srt/.test(file.type)
              ) {
                vtt = srtToVtt(text);
              } else {
                // try to guess: if contains "-->" treat as srt
                if (text.includes("-->")) vtt = srtToVtt(text);
                else vtt = text;
              }

              if (!vtt) throw new Error("Could not convert subtitle to VTT");

              // Create data URL
              const blob = new Blob([vtt], { type: "text/vtt" });
              const reader = new FileReader();
              reader.onload = () => {
                const dataUrl = reader.result;
                if (_storeCustomSubtitle(dataUrl)) {
                  status.textContent =
                    "Uploaded subtitle saved locally for this item.";
                  // Re-attach to currently playing video
                  try {
                    if (_nativeVideo) {
                      // remove existing uploaded tracks
                      Array.from(
                        _nativeVideo.querySelectorAll("track"),
                      ).forEach((t) => t.remove());
                      const t = document.createElement("track");
                      t.kind = "subtitles";
                      t.label = "Uploaded";
                      t.srclang = "en";
                      t.src = dataUrl;
                      t.default = true;
                      _nativeVideo.appendChild(t);
                      // custom subtitle overrides any remote subtitle
                      _currentSubtitleUrl = null;
                    }
                  } catch (e) {
                    console.warn(
                      "Could not attach uploaded track immediately",
                      e,
                    );
                  }
                } else {
                  status.textContent = "Failed to save subtitle locally.";
                }
                updateUi();
              };
              reader.onerror = (err) => {
                console.warn("Failed to read blob as dataURL", err);
                status.textContent = "Failed to process subtitle.";
              };
              reader.readAsDataURL(blob);
            } catch (err) {
              console.error("Subtitle upload failed", err);
              status.textContent = "Failed to process subtitle.";
            } finally {
              input.value = "";
            }
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            _clearStoredCustomSubtitle();
            status.textContent = "Cleared uploaded subtitle.";
            // reload video tracks: remove custom tracks and re-add default if present
            try {
              if (_nativeVideo) {
                Array.from(_nativeVideo.querySelectorAll("track")).forEach(
                  (t) => t.remove(),
                );
                if (_currentSubtitleUrl) {
                  const track = document.createElement("track");
                  track.kind = "subtitles";
                  track.label = "Default";
                  track.srclang = "en";
                  track.src = _currentSubtitleUrl;
                  track.default = true;
                  _nativeVideo.appendChild(track);
                }
              }
            } catch (e) {
              console.warn("Could not reattach default subtitle", e);
            }
            updateUi();
          });
        }

        // Expose a function to update UI when movie/episode changes
        window._updateSubtitleUi = updateUi;
  // Initial UI update (may be before movie loaded)
  setTimeout(updateUi, 100);
      })();

      // ── PRE-ROLL ADS FOR NON-PREMIUM USERS ────────────────────────────
      let _isAdPlaying = false;
  let _prevSubtitleDuringAd = null;
  let _pendingSubtitleAttach = null;
      let _adCountdownInterval = null;
      let _adFinishHandled = false;
      let _mainContentContext = null;
      let _adSkipUnlocked = false;
      let _adMaxAllowedTime = 0;
      let _adStartedOnce = false;
      let _adAutoplayRecoveryBound = false;
      let _adUserUnmuted = false;

      function _clearAdCountdown() {
        if (_adCountdownInterval) {
          clearInterval(_adCountdownInterval);
          _adCountdownInterval = null;
        }
      }

      function _getAdEls() {
        return {
          overlay: document.getElementById("adOverlay"),
          counter: document.getElementById("adCounter"),
          skipBtn: document.getElementById("skipAdBtn"),
          unmuteBtn: document.getElementById("unmuteAdBtn"),
          hint: document.getElementById("adCenterHint"),
          qualityWrap: document.getElementById("qualityWrap"),
        };
      }

      function _syncAdMuteButton() {
        const { unmuteBtn } = _getAdEls();
        if (!unmuteBtn) return;
        if (!_isAdPlaying) {
          unmuteBtn.style.display = "none";
          unmuteBtn.textContent = "🔊 Unmute";
          return;
        }

        unmuteBtn.style.display = "inline-flex";
        const muted = !_nativeVideo || _nativeVideo.muted;
        unmuteBtn.textContent = muted ? "🔊 Unmute" : "🔇 Mute";
      }

      function _setAdMutedState(shouldMute) {
        if (_nativeVideo) {
          _nativeVideo.muted = shouldMute;
          _nativeVideo.defaultMuted = shouldMute;
          if (
            !shouldMute &&
            (_nativeVideo.volume === 0 || Number.isNaN(_nativeVideo.volume))
          ) {
            _nativeVideo.volume = 1;
          }
        }
        _adUserUnmuted = !shouldMute;
        _syncAdMuteButton();
      }

      function _showAdUi(ad) {
        const { overlay, counter, skipBtn, unmuteBtn, hint, qualityWrap } =
          _getAdEls();
        _adUserUnmuted = false;
        if (overlay) overlay.classList.add("active");
        if (hint) {
          hint.style.display = "block";
          hint.textContent = ad?.title
            ? `Playing ad: ${ad.title}`
            : "Playing advertisement...";
        }
        if (counter) {
          counter.textContent = "Advertisement";
        }
        if (skipBtn) {
          skipBtn.style.display = "none";
          skipBtn.disabled = true;
          skipBtn.textContent = "Skip Ad";
        }
        if (unmuteBtn) {
          unmuteBtn.style.display = "inline-flex";
          unmuteBtn.textContent = "🔊 Unmute";
          unmuteBtn.onclick = () => {
            if (!_isAdPlaying) return;
            _setAdMutedState(_nativeVideo ? !_nativeVideo.muted : false);
          };
        }
        if (qualityWrap) {
          qualityWrap.style.display = "none";
        }
      }

      function _hideAdUi() {
        const { overlay, hint, skipBtn, unmuteBtn } = _getAdEls();
        if (overlay) overlay.classList.remove("active");
        if (hint) {
          hint.style.display = "none";
          hint.onclick = null;
        }
        if (skipBtn) {
          skipBtn.style.display = "none";
          skipBtn.disabled = true;
          skipBtn.textContent = "Skip Ad";
          skipBtn.onclick = null;
        }
        if (unmuteBtn) {
          unmuteBtn.style.display = "none";
          unmuteBtn.textContent = "🔊 Unmute";
          unmuteBtn.onclick = null;
        }
      }

      function _bindAdAutoplayRecovery() {
        if (_adAutoplayRecoveryBound) return;
        _adAutoplayRecoveryBound = true;

        const tryResumeAd = async () => {
          if (!_isAdPlaying || !_nativeVideo) return;
          try {
            if (!_adUserUnmuted) {
              _nativeVideo.muted = true;
              _nativeVideo.defaultMuted = true;
            }
            await _nativeVideo.play();
            _syncAdMuteButton();
          } catch (_) {}
        };

        ["pointerdown", "click", "keydown", "touchstart"].forEach((evt) => {
          window.addEventListener(evt, tryResumeAd, {
            passive: true,
            capture: true,
          });
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            tryResumeAd();
          }
        });

        window.addEventListener("pageshow", () => {
          tryResumeAd();
        });
      }

      async function fetchActivePreRollAd() {
        const candidates = [
          "/api/public/ads/pre-roll",
          "/api/admin/ads/api/public/ads/pre-roll",
        ];

        for (const url of candidates) {
          try {
            const res = await fetch(url, { headers: { ...authHeaders() } });
            if (res.status === 204) return null;
            if (!res.ok) continue;
            const data = await res.json();
            if (data && data.srcFilm) return data;
          } catch (e) {
            console.warn("Failed to fetch pre-roll ad from", url, e);
          }
        }
        return null;
      }

      function _finishAdAndPlayMain() {
        if (_adFinishHandled) return;
        _adFinishHandled = true;
        _isAdPlaying = false;
        _adSkipUnlocked = false;
        _adMaxAllowedTime = 0;
        _adUserUnmuted = false;
        _clearAdCountdown();
        _hideAdUi();

        const ctx = _mainContentContext;
        _mainContentContext = null;

        if (!ctx) return;

  // restore subtitle state after ad
  try { _restoreSubtitlesAfterAd(); } catch (e) {}

        renderQualityDropdown(ctx.videoUrl, ctx.variants, ctx.isPremiumUser);
        loadVideo(ctx.videoUrl, ctx.startSec || 0);
        setTimeout(() => {
          if (_nativeVideo) {
            _nativeVideo.muted = false;
            _nativeVideo.defaultMuted = false;
            _nativeVideo.controls = true;
            _nativeVideo.controlsList =
              "nodownload noplaybackrate noremoteplayback";
          }
        }, 0);
      }

      function _armSkippableCountdown(ad) {
        const { counter, skipBtn } = _getAdEls();
        const allowSkip = Boolean(ad && ad.skippable);
        const skipAfter = Math.max(0, Number(ad?.skipAfterSeconds || 0));
        _adSkipUnlocked = false;

        _clearAdCountdown();

        if (skipBtn) {
          skipBtn.onclick = () => {
            if (!_adSkipUnlocked) return;
            _finishAdAndPlayMain();
          };
        }

        if (!allowSkip) {
          if (counter) counter.textContent = "Advertisement";
          if (skipBtn) {
            skipBtn.style.display = "none";
            skipBtn.disabled = true;
            skipBtn.textContent = "Skip Ad";
          }
          return;
        }

        if (skipAfter <= 0) {
          _adSkipUnlocked = true;
          if (counter) counter.textContent = "You can skip this ad";
          if (skipBtn) {
            skipBtn.style.display = "inline-flex";
            skipBtn.disabled = false;
            skipBtn.textContent = "Skip Ad";
          }
          return;
        }

        const startedAt = Date.now();
        if (counter) counter.textContent = `Skip in ${skipAfter}s`;
        if (skipBtn) {
          skipBtn.style.display = "inline-flex";
          skipBtn.disabled = true;
          skipBtn.textContent = `Skip in ${skipAfter}s`;
        }

        _adCountdownInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startedAt) / 1000);
          const remain = Math.max(0, skipAfter - elapsed);

          if (remain > 0) {
            if (counter) counter.textContent = `Skip in ${remain}s`;
            if (skipBtn) skipBtn.textContent = `Skip in ${remain}s`;
            return;
          }

          _clearAdCountdown();
          _adSkipUnlocked = true;
          if (counter) counter.textContent = "You can skip this ad";
          if (skipBtn) {
            skipBtn.style.display = "inline-flex";
            skipBtn.disabled = false;
            skipBtn.textContent = "Skip Ad";
          }
        }, 250);
      }

      function _lockAdSeeking(video) {
        if (!video) return;

        const syncAllowedTime = () => {
          if (!_isAdPlaying) return;
          const now = Number(video.currentTime || 0);
          if (Number.isFinite(now) && now > _adMaxAllowedTime) {
            _adMaxAllowedTime = now;
          }
        };

        const forceBack = () => {
          if (!_isAdPlaying) return;
          const now = Number(video.currentTime || 0);
          if (Number.isFinite(now) && now > _adMaxAllowedTime + 0.2) {
            video.currentTime = Math.max(0, _adMaxAllowedTime);
          }
        };

        video.addEventListener("timeupdate", syncAllowedTime);
        video.addEventListener("seeking", forceBack);
        video.addEventListener("seeked", forceBack);
        video.addEventListener("mousedown", forceBack);
        video.addEventListener("touchstart", forceBack, { passive: true });
        video.addEventListener("contextmenu", (e) => {
          if (_isAdPlaying) e.preventDefault();
        });
      }

      function _disableSubtitlesForAd() {
        try {
          // Capture current subtitle tracks (both remote and uploaded) so we can restore them.
          const captured = [];
          const captureFromEl = (el) => {
            if (!el) return;
            Array.from(el.querySelectorAll('track')).forEach((t) => {
              try {
                const src = t.src || '';
                const isData = src.startsWith('data:');
                captured.push({ src, label: t.label || '', srclang: t.srclang || '', isDefault: !!t.default, isData });
                // Prefer disabling the textTrack rather than removing the element so user-uploaded tracks can be restored.
                try {
                  if (t.track) t.track.mode = 'disabled';
                } catch (_) {}
                try { t.default = false; } catch (_) {}
              } catch (e) {}
            });
          };

          if (_nativeVideo) captureFromEl(_nativeVideo);
          const vidEl = document.getElementById('videoPlayer');
          if (vidEl && vidEl.tagName === 'VIDEO') captureFromEl(vidEl);

          // For Hls.js, ask it to hide subtitle tracks
          try {
            if (window._hlsInstance && typeof window._hlsInstance.subtitleTrack !== 'undefined') {
              // -1 disables subtitle rendering in hls.js
              window._hlsInstance.subtitleTrack = -1;
            }
          } catch (e) {}

          _prevSubtitleDuringAd = captured.length > 0 ? captured : null;
          // We keep _currentSubtitleUrl untouched here so restore logic can decide what to re-enable.
        } catch (e) {
          console.warn('disableSubtitlesForAd failed', e);
        }
      }

      function attachSubtitleRespectingAd(url, lang) {
        try {
          if (!_isAdPlaying) {
            attachRemoteSubtitleToVideo(url, lang);
            // record the active remote subtitle only when actually attached
            _currentSubtitleUrl = url;
          } else {
            // queue a pending attach while ad is playing, but do NOT overwrite
            // the recorded _currentSubtitleUrl (which represents what was active
            // before the ad) so restore logic can correctly choose which to
            // re-apply after the ad ends.
            _pendingSubtitleAttach = { url, lang };
          }
        } catch (e) {
          console.warn('attachSubtitleRespectingAd failed', e);
        }
      }

      function _restoreSubtitlesAfterAd() {
        try {
          // If a user-uploaded custom subtitle exists, it should override remote ones — restore it first.
          const custom = _getStoredCustomSubtitle();
          if (custom) {
            try {
              // enable any existing data: tracks
              const enableFromEl = (el) => {
                if (!el) return;
                Array.from(el.querySelectorAll('track')).forEach((t) => {
                  try {
                    if (t.src && t.src.startsWith('data:')) {
                      if (t.track) t.track.mode = 'showing';
                      t.default = true;
                    }
                  } catch (e) {}
                });
              };
              if (_nativeVideo) enableFromEl(_nativeVideo);
              const vidEl = document.getElementById('videoPlayer');
              if (vidEl && vidEl.tagName === 'VIDEO') enableFromEl(vidEl);
            } catch (e) {}
            _prevSubtitleDuringAd = null;
            _pendingSubtitleAttach = null;
            return;
          }

          // If a pending attach was queued while ad played, prefer it
          if (_pendingSubtitleAttach) {
            try {
              attachRemoteSubtitleToVideo(_pendingSubtitleAttach.url, _pendingSubtitleAttach.lang || '');
              _currentSubtitleUrl = _pendingSubtitleAttach.url;
            } catch (e) {
              console.warn('failed to attach pending subtitle', e);
            }
            _pendingSubtitleAttach = null;
            _prevSubtitleDuringAd = null;
            return;
          }

          // Otherwise, try to re-enable previously-captured tracks
          if (_prevSubtitleDuringAd && Array.isArray(_prevSubtitleDuringAd) && _prevSubtitleDuringAd.length > 0) {
            let restored = false;
            try {
              // Try to re-enable in-DOM tracks first
              const enableFromEl = (el) => {
                if (!el) return;
                Array.from(el.querySelectorAll('track')).forEach((t) => {
                  try {
                    const src = t.src || '';
                    const match = _prevSubtitleDuringAd.find((p) => p.src === src);
                    if (match) {
                      if (t.track) t.track.mode = 'showing';
                      if (match.isDefault) t.default = true;
                      restored = true;
                    }
                  } catch (e) {}
                });
              };
              if (_nativeVideo) enableFromEl(_nativeVideo);
              const vidEl = document.getElementById('videoPlayer');
              if (vidEl && vidEl.tagName === 'VIDEO') enableFromEl(vidEl);
            } catch (e) {}

            // If nothing in DOM was restored, attach the first remote non-data track again
            if (!restored) {
              const firstRemote = _prevSubtitleDuringAd.find((p) => !p.isData && p.src);
              if (firstRemote) {
                try { attachRemoteSubtitleToVideo(firstRemote.src, firstRemote.srclang || ''); _currentSubtitleUrl = firstRemote.src; restored = true; } catch (e) {}
              }
            }

            // For Hls.js, try to restore subtitleTrack automatically if we have a recorded url
            try {
              if (!restored && window._hlsInstance && typeof window._hlsInstance.subtitleTrack !== 'undefined') {
                // no-op: letting hls.js manage textTracks if it can; we already reattached above if needed
              }
            } catch (e) {}
          }

          _prevSubtitleDuringAd = null;
        } catch (e) {
          console.warn('restoreSubtitlesAfterAd failed', e);
        }
      }

      function _playPreRollAd(ad) {
        _adFinishHandled = false;
        _isAdPlaying = true;
        _adSkipUnlocked = false;
        _adMaxAllowedTime = 0;
        _adStartedOnce = false;
        _showAdUi(ad);
  // disable subtitles while ad plays (but preserve user-uploaded custom subtitle)
  try { _disableSubtitlesForAd(); } catch (e) {}
        _armSkippableCountdown(ad);
        _bindAdAutoplayRecovery();

        loadVideo(ad.srcFilm, 0);

        const waitForVideo = () => {
          if (!_nativeVideo) {
            setTimeout(waitForVideo, 100);
            return;
          }

          _nativeVideo.controls = false;
          _nativeVideo.autoplay = true;
          _nativeVideo.preload = "auto";
          _nativeVideo.playsInline = true;
          _nativeVideo.defaultMuted = true;
          _nativeVideo.muted = true;
          _nativeVideo.volume = 1;
          _nativeVideo.setAttribute("autoplay", "autoplay");
          _nativeVideo.setAttribute("muted", "muted");
          _nativeVideo.setAttribute("playsinline", "playsinline");
          _nativeVideo.controlsList =
            "nodownload noplaybackrate nofullscreen noremoteplayback";
          _nativeVideo.disablePictureInPicture = true;
          _syncAdMuteButton();
          _nativeVideo.addEventListener(
            "loadedmetadata",
            () => {
              _adMaxAllowedTime = 0;
            },
            { once: true },
          );
          _nativeVideo.addEventListener(
            "playing",
            () => {
              _adStartedOnce = true;
              const { hint } = _getAdEls();
              if (hint) {
                hint.style.display = "none";
                hint.onclick = null;
              }
            },
            { once: true },
          );
          _lockAdSeeking(_nativeVideo);

          _nativeVideo.addEventListener("ended", _finishAdAndPlayMain, {
            once: true,
          });
          _nativeVideo.addEventListener(
            "error",
            () => {
              console.warn("Ad playback failed, falling back to main content");
              _finishAdAndPlayMain();
            },
            { once: true },
          );

          const tryPlayMuted = async () => {
            try {
              if (!_adUserUnmuted) {
                _nativeVideo.defaultMuted = true;
                _nativeVideo.muted = true;
              }
              await _nativeVideo.play();
              _syncAdMuteButton();
            } catch (e) {
              console.warn("Autoplay for ad was blocked:", e);
              const { hint } = _getAdEls();
              if (hint) {
                hint.style.display = "block";
                hint.textContent =
                  "Advertisement is ready. Click anywhere to continue.";
                hint.onclick = async () => {
                  try {
                    if (!_adUserUnmuted) {
                      _nativeVideo.defaultMuted = true;
                      _nativeVideo.muted = true;
                    }
                    await _nativeVideo.play();
                    _syncAdMuteButton();
                    hint.style.display = "none";
                    hint.onclick = null;
                  } catch (_) {}
                };
              }
            }
          };

          tryPlayMuted();
        };

        waitForVideo();
      }

      async function playMainContentWithOptionalAd({
        videoUrl,
        startSec = 0,
        variants = [],
        isPremiumUser = false,
      }) {
        const normalizedUrl = (videoUrl || "").trim();

        if (!normalizedUrl) {
          renderQualityDropdown("", [], isPremiumUser);
          loadVideo("", 0);
          return;
        }

        _mainContentContext = {
          videoUrl: normalizedUrl,
          startSec,
          variants,
          isPremiumUser,
        };

        if (isPremiumUser) {
          _isAdPlaying = false;
          _hideAdUi();
          renderQualityDropdown(normalizedUrl, variants, isPremiumUser);
          loadVideo(normalizedUrl, startSec || 0);
          setTimeout(() => {
            if (_nativeVideo) {
              _nativeVideo.muted = false;
              _nativeVideo.defaultMuted = false;
              _nativeVideo.controls = true;
            }
          }, 0);
          _mainContentContext = null;
          return;
        }

        const ad = await fetchActivePreRollAd();
        if (!ad || !ad.srcFilm) {
          _isAdPlaying = false;
          _hideAdUi();
          renderQualityDropdown(normalizedUrl, variants, isPremiumUser);
          loadVideo(normalizedUrl, startSec || 0);
          setTimeout(() => {
            if (_nativeVideo) {
              _nativeVideo.muted = false;
              _nativeVideo.defaultMuted = false;
              _nativeVideo.controls = true;
            }
          }, 0);
          _mainContentContext = null;
          return;
        }

        _playPreRollAd(ad);
      }

      _initAndStart();
    </script>
  </body>
</html>
