<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>MovieZone | Watch Movie</title>
    <style>
        :root {
            --bg: #020617;
            --bg-soft: #0f172a;
            --accent: #f97316;
            --accent2: #ec4899;
            --text-main: #e5e7eb;
            --text-subtle: #9ca3af;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family:
                    "Poppins",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: radial-gradient(
                    circle at 30% 20%,
                    #f97316,
                    #e11d48 55%,
                    #4f46e5
            );
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(248, 113, 113, 0.55);
            font-size: 14px;
            font-weight: 700;
        }
        .nav-title-main {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
        }
        .nav-title-sub {
            font-size: 11px;
            color: var(--text-subtle);
        }
        .back-link {
            font-size: 13px;
            color: var(--text-subtle);
            text-decoration: none;
            cursor: pointer;
        }
        .back-link:hover {
            color: var(--text-main);
        }

        /* site button styles (shared across pages) */
        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        .btn.ghost {
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: var(--text-main);
        }

        /* VIDEO PLAYER */
        .video-section {
            margin-bottom: 24px;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        /* All player types: div, iframe, video — fill the container */
        .video-container > *,
        .video-player {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }

        /* EPISODE SELECTOR */
        .episode-selector {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 24px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        .episode-selector.hidden {
            display: none;
        }
        .episode-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .episode-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .episode-button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 60px;
            text-align: center;
        }
        .episode-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }
        .episode-button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .episode-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .season-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-subtle);
            margin-bottom: 8px;
            margin-top: 12px;
            width: 100%;
        }

        /* MOVIE INFO */
        .movie-info {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .poster-wrapper {
            flex-shrink: 0;
        }
        .poster {
            width: 140px;
            height: 210px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        .info-content {
            flex: 1;
        }
        .movie-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        .movie-subtitle {
            font-size: 16px;
            color: var(--text-subtle);
            margin-bottom: 16px;
        }
        .movie-overview {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        /* LOADING */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            font-size: 16px;
            color: var(--text-subtle);
        }

        @media (max-width: 768px) {
            .movie-info {
                flex-direction: column;
                text-align: center;
            }
            .poster {
                width: 120px;
                height: 180px;
                margin: 0 auto;
            }
            .episode-selector {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
        }

        /* AD BANNER */
        .ad-banner {
            margin: 24px 0;
            padding: 16px;
            background: linear-gradient(135deg, #f97316, #ec4899);
            border-radius: 12px;
            text-align: center;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        .ad-banner.hidden {
            display: none;
        }
        .ad-text {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .ad-subtext {
            font-size: 14px;
            opacity: 0.9;
        }

        /* COMMENTS SECTION */
        .comments-section {
            margin-top: 32px;
            padding: 24px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        .comments-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        .comment-input-container {
            margin-bottom: 20px;
        }
        .comment-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }
        .comment-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .comment-input::placeholder {
            color: var(--text-subtle);
        }
        .comment-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .comment-submit {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .comment-submit:hover {
            background: #ea580c;
        }
        .comment-submit:disabled {
            background: var(--text-subtle);
            cursor: not-allowed;
        }
        .comment-char-count {
            font-size: 12px;
            color: var(--text-subtle);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .comment-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 14px;
        }

        .comment-time {
            font-size: 12px;
            color: var(--text-subtle);
            margin-left: 8px;
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        .comment-report {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-subtle);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .comment-report:hover {
            border-color: rgba(249, 115, 22, 0.6);
            color: var(--accent);
        }

        .comment-error {
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
        }

        .comment-error.hidden {
            display: none;
        }

        /* PRE-ROLL ADS */
        .ad-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 20;
        }
        .ad-overlay.active {
            display: block;
        }
        .ad-chip {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.88);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .ad-controls {
            position: absolute;
            right: 14px;
            top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        .ad-counter {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.88);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .skip-ad-btn {
            padding: 8px 12px;
            border-radius: 999px;
            border: none;
            background: #fff;
            color: #111827;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }
        .skip-ad-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .ad-center-hint {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.88);
            color: #fff;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

    </style>
</head>
<body>
<div class="page-container">
    <header class="navbar">
        <div class="nav-left">
            <div class="nav-logo">MZ</div>
            <div>
                <div class="nav-title-main">MovieZone</div>
                <div class="nav-title-sub">Watch Movie</div>
            </div>
        </div>
        <a href="javascript:history.back()" class="back-link">← Back</a>
    </header>

    <div id="loading" class="loading">Loading...</div>

    <div id="content" style="display: none">
        <!-- VIDEO PLAYER -->
        <div class="video-section">
            <div class="video-container">
                <div id="videoPlayer" class="video-player"></div>
                <div id="adOverlay" class="ad-overlay">
                    <div class="ad-chip">Advertisement</div>
                    <div class="ad-controls">
                        <div id="adCounter" class="ad-counter">Ad</div>
                        <button id="skipAdBtn" class="skip-ad-btn" type="button">Skip Ad</button>
                        <button id="unmuteAdBtn" class="unmute-ad-btn" type="button">🔊 Unmute</button>
                    </div>
                    <div id="adCenterHint" class="ad-center-hint" style="display:none;">
                        Playing advertisement...
                    </div>
                </div>
            </div>
            <div id="qualityWrap" style="margin-top:12px; display:none;">
                <label for="qualitySelect" style="font-size:13px; color: var(--text-subtle); margin-right:8px;">
                    Quality:
                </label>
                <select id="qualitySelect" class="btn ghost" style="padding:8px 12px;">
                    <option value="auto">Auto</option>
                </select>
            </div>
        </div>

        <!-- EPISODE SELECTOR (hidden for movies) -->
        <div id="episodeSelector" class="episode-selector hidden">
            <div class="episode-label">Select Episode:</div>
            <div id="episodeButtons" class="episode-buttons">
                <!-- Episode buttons will be generated here -->
            </div>
        </div>

        <!-- MOVIE INFO -->
        <div class="movie-info">
            <div class="poster-wrapper">
                <div id="poster" class="poster"></div>
            </div>
            <div class="info-content">
                <h1 id="movieTitle" class="movie-title">Loading...</h1>
                <div id="movieSubtitle" class="movie-subtitle"></div>
                <div id="movieOverview" class="movie-overview">Loading...</div>
            </div>
        </div>

        <!-- AD BANNER (shown for non-premium users) -->
        <div id="adBanner" class="ad-banner hidden">
            <div class="ad-text">
                🎬 Upgrade to Premium for Ad-Free Experience!
            </div>
            <div class="ad-subtext">Remove ads and enjoy unlimited streaming</div>
        </div>

        <!-- COMMENTS SECTION -->
        <div class="comments-section">
            <h3 class="comments-title">Comments</h3>
            <div class="comment-input-container">
            <textarea
                    id="commentInput"
                    class="comment-input"
                    placeholder="Share your thoughts about this movie..."
                    maxlength="1000"></textarea>
                <div class="comment-actions">
                    <div id="charCount" class="comment-char-count">0/1000</div>
                    <button id="submitComment" class="comment-submit">
                        Post Comment
                    </button>
                </div>
            </div>
            <div id="commentError" class="comment-error hidden"></div>
            <div id="commentsList" class="comments-list">
                <div class="comment-text">Loading comments...</div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="js/bannerads.js"></script>
<script>
    console.log("movie-watch script loaded");
    window.addEventListener("error", (event) => {
        console.error("Global JS error:", event.error || event.message, event);
        const commentError = document.getElementById("commentError");
        if (commentError) {
            commentError.textContent = `Error: ${event.error || event.message}`;
            commentError.classList.remove("hidden");
        }
    });
    window.addEventListener("unhandledrejection", (event) => {
        console.error("Unhandled rejection:", event.reason);
        const commentError = document.getElementById("commentError");
        if (commentError) {
            commentError.textContent = `Error: ${event.reason}`;
            commentError.classList.remove("hidden");
        }
    });

    let _currentMovieId = null;
    let _currentType = null;
    let _currentEpisodeId = null;
    let _currentVariants = [];
    let _currentPlaybackMasterUrl = "";

    function authHeaders() {
        const token = localStorage.getItem("token");
        return token
            ? { Authorization: `Bearer ${token}` }
            : {};
    }

    async function loadWatchPage() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const type = params.get("type") || "movie";
        const season = params.get("season");
        const episode = params.get("episode");

        _currentMovieId = id ? parseInt(id, 10) : null;
        _currentType = type;
        _currentEpisodeId = episode ? parseInt(episode, 10) : null;

        if (!id) {
            alert("Missing movie ID");
            window.location.href = "homepage.html";
            return;
        }

        try {
            const res = await fetch(
                `/api/public/movies/detail?type=${encodeURIComponent(type)}&id=${encodeURIComponent(id)}`,
                {
                    headers: {
                        ...authHeaders()
                    }
                }
            );

            if (!res.ok) {
                throw new Error("Failed to load movie details");
            }

            const movieData = await res.json();

            let seasonsData = [];
            if (type === "tv") {
                try {
                    const seasonsRes = await fetch(
                        `/api/movies/tv/${encodeURIComponent(id)}/seasons`,
                        {
                            headers: {
                                ...authHeaders()
                            }
                        }
                    );

                    if (seasonsRes.ok) {
                        seasonsData = await seasonsRes.json();
                    }
                } catch (e) {
                    console.error("Failed to load seasons:", e);
                }
            }

            renderWatchPage(movieData, type, seasonsData, season, episode);
        } catch (e) {
            console.error(e);
            document.getElementById("loading").textContent = "Failed to load movie.";
        }
    }
    function buildVariantPlaylistUrl(masterUrl, variantName) {
        if (!masterUrl || !variantName) return masterUrl;
        const idx = masterUrl.lastIndexOf("/master.m3u8");
        if (idx === -1) return masterUrl;
        const base = masterUrl.substring(0, idx);
        return `${base}/${variantName}/playlist.m3u8`;
    }
    function renderQualityDropdown(masterUrl, variants, isPremiumUser = false) {
        const wrap = document.getElementById("qualityWrap");
        const select = document.getElementById("qualitySelect");

        if (!wrap || !select) return;

        _currentPlaybackMasterUrl = masterUrl || "";
        _currentVariants = Array.isArray(variants) ? variants : [];

        select.innerHTML = isPremiumUser
            ? `<option value="auto">Auto</option>`
            : "";

        if (!_currentPlaybackMasterUrl || _currentVariants.length === 0) {
            wrap.style.display = "none";
            return;
        }

        _currentVariants.forEach((v) => {
            const option = document.createElement("option");
            option.value = v;
            option.textContent = v;
            select.appendChild(option);
        });

        wrap.style.display = "block";

        select.onchange = () => {
            const selected = select.value;
            const resume = _getCurrentTime() || 0;

            if (selected === "auto") {
                loadVideo(_currentPlaybackMasterUrl, resume);
            } else {
                loadVideo(buildVariantPlaylistUrl(_currentPlaybackMasterUrl, selected), resume);
            }
        };
    }

    function renderWatchPage(
        movieData,
        type,
        seasonsData,
        selectedSeason,
        selectedEpisode,
    ) {
        document.title = `MovieZone | Watch ${movieData.title || "Movie"}`;

        // Hide loading, show content
        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "block";

        // Set poster
        const poster = document.getElementById("poster");
        if (poster) {
            poster.style.backgroundImage = movieData.posterUrl
                ? `url('${movieData.posterUrl}')`
                : "url('https://via.placeholder.com/400x600?text=No+Image')";
        }

        // Set title and subtitle
        const titleEl = document.getElementById("movieTitle");
        const subtitleEl = document.getElementById("movieSubtitle");
        const overviewEl = document.getElementById("movieOverview");

        if (titleEl) {
            titleEl.textContent = movieData.title || "Unknown Title";
        }

        const bits = [];
        bits.push(type === "tv" ? "TV Series" : "Movie");
        if (movieData.year) bits.push(`${movieData.year}`);
        if (movieData.runtime) bits.push(`${movieData.runtime} min`);
        if (subtitleEl) {
            subtitleEl.textContent = bits.join(" · ");
        }

        if (overviewEl) {
            overviewEl.textContent =
                movieData.overview || "No overview available.";
        }

        // Handle TV series vs Movie (errors here should not prevent comments from loading)
        try {
            if (type === "tv") {
                setupTVSeries(
                    movieData,
                    seasonsData,
                    selectedSeason,
                    selectedEpisode,
                );
            } else {
                setupMovie(movieData);
            }
        } catch (e) {
            console.warn("Video setup failed, continuing to load comments", e);
        }

        // Check premium status and show/hide ad banner (if function exists)
        if (typeof checkUserPremiumStatus === "function") {
            checkUserPremiumStatus()
                .then((isPremium) => {
                    const adBanner = document.getElementById("adBanner");
                    if (isPremium) {
                        adBanner.classList.add("hidden");
                    } else {
                        adBanner.classList.remove("hidden");
                    }
                })
                .catch((e) => {
                    console.warn("Premium status check failed", e);
                });
        }

        // Start the elapsed-time tracker now that we have a video loaded.
        // Use runtime (minutes → seconds) when available; TV episodes default to 45 min.
        const runtimeSec = movieData.runtime
            ? movieData.runtime * 60
            : type === "tv"
                ? 45 * 60
                : 0;
        if (window._startHistoryTracker)
            window._startHistoryTracker(runtimeSec);

        // Initialize comments functionality
        initializeComments();
    }

    function initializeComments() {
        console.log("Initializing comments section");

        let commentInput = null;
        let submitBtn = null;
        let charCount = null;
        let commentError = null;
        let commentsList = null;

        try {
            commentInput = document.getElementById("commentInput");
            submitBtn = document.getElementById("submitComment");
            charCount = document.getElementById("charCount");
            commentError = document.getElementById("commentError");
            commentsList = document.getElementById("commentsList");

            function setError(message) {
                if (!commentError) return;
                commentError.textContent = message || "";
                commentError.classList.toggle("hidden", !message);
            }

            function updateSubmitState() {
                // Keep the button enabled so the user can always attempt to post.
                // The click handler will validate the comment text and show an error if needed.
                if (submitBtn) {
                    submitBtn.disabled = false;
                }
            }

            function renderCommentRow(review) {
                const row = document.createElement("div");
                row.className = "comment-row";

                const content = document.createElement("div");
                content.style.flex = "1";

                const meta = document.createElement("div");
                meta.className = "comment-meta";

                const author = document.createElement("div");
                author.className = "comment-author";
                author.textContent = review.username || "Anonymous";

                const time = document.createElement("div");
                time.className = "comment-time";
                if (review.createdDate) {
                    const date = new Date(review.createdDate);
                    time.textContent = date.toLocaleString();
                }

                meta.appendChild(author);
                meta.appendChild(time);

                const text = document.createElement("div");
                text.className = "comment-text";
                text.textContent = review.comment || "";

                content.appendChild(meta);
                content.appendChild(text);

                const actions = document.createElement("div");
                actions.style.display = "flex";
                actions.style.alignItems = "center";

                const reportBtn = document.createElement("button");
                reportBtn.className = "comment-report";
                reportBtn.type = "button";
                reportBtn.textContent = "🚩 Report";
                reportBtn.addEventListener("click", async () => {
                    if (!localStorage.getItem("token")) {
                        alert("Please log in to report comments.");
                        return;
                    }

                    // show modal form to collect reason
                    const modal = getOrCreateReportModal();
                    modal.show(
                        review.reviewId,
                        async (reason, setError, setSubmitting) => {
                            if (!reason || reason.trim().length === 0) {
                                setError("Please provide a reason for the report.");
                                return { success: false };
                            }

                            reportBtn.disabled = true;
                            setSubmitting(true);
                            try {
                                const token = localStorage.getItem("token");
                                console.debug("Sending report, token present?", !!token);

                                const res = await fetch(
                                    `/api/user/reviews/${encodeURIComponent(review.reviewId)}/report`,
                                    {
                                        method: "POST",
                                        headers: {
                                            "Content-Type": "application/json",
                                            Authorization: `Bearer ${token}`,
                                        },
                                        body: JSON.stringify({ reason }),
                                    },
                                );

                                if (!res.ok) {
                                    let msg =
                                        "Could not send report. Please try again later.";
                                    try {
                                        const json = await res.json();
                                        if (json && json.message) msg = json.message;
                                    } catch (err) {
                                        const text = await res.text();
                                        if (text) msg = text;
                                    }
                                    setError(msg);
                                    setSubmitting(false);
                                    reportBtn.disabled = false;
                                    return { success: false };
                                }

                                reportBtn.textContent = "Reported";
                                setSubmitting(false);
                                return { success: true };
                            } catch (e) {
                                console.warn("Report failed", e);
                                setError("Could not send report. Please try again later.");
                                setSubmitting(false);
                                reportBtn.disabled = false;
                                return { success: false };
                            }
                        },
                    );
                });

                actions.appendChild(reportBtn);

                row.appendChild(content);
                row.appendChild(actions);
                return row;
            }

            function setCommentListPlaceholder(message) {
                if (!commentsList) return;
                commentsList.innerHTML = `<div class="comment-text">${message}</div>`;
            }

            async function loadComments() {
                console.log("Loading comments...");
                if (!commentsList) return;
                setCommentListPlaceholder("Loading comments...");

                const params = new URLSearchParams();
                if (_currentType === "tv" && _currentEpisodeId) {
                    params.set("episodeId", _currentEpisodeId);
                } else if (_currentMovieId) {
                    params.set("movieId", _currentMovieId);
                }

                try {
                    const res = await fetch(
                        `/api/public/reviews?${params.toString()}`,
                    );
                    if (!res.ok) throw new Error("Failed to load comments");
                    const data = await res.json();

                    const reviews = Array.isArray(data.reviews) ? data.reviews : [];
                    if (reviews.length === 0) {
                        setCommentListPlaceholder(
                            "No comments yet. Be the first to post one!",
                        );
                        return;
                    }

                    commentsList.innerHTML = "";
                    reviews.forEach((review) => {
                        commentsList.appendChild(renderCommentRow(review));
                    });
                } catch (err) {
                    console.error(err);
                    setCommentListPlaceholder("Failed to load comments.");
                }
            }

            // Report modal helper: creates a singleton modal to collect reason
            function getOrCreateReportModal() {
                let existing = document.getElementById("report-modal-root");
                if (existing) {
                    return existing._api;
                }

                const root = document.createElement("div");
                root.id = "report-modal-root";
                root.style.position = "fixed";
                root.style.left = 0;
                root.style.top = 0;
                root.style.right = 0;
                root.style.bottom = 0;
                root.style.display = "flex";
                root.style.alignItems = "center";
                root.style.justifyContent = "center";
                root.style.background = "rgba(0,0,0,0.6)";
                root.style.zIndex = 9999;
                root.style.visibility = "hidden";

                const box = document.createElement("div");
                box.className = "card";
                box.style.width = "420px";
                box.style.maxWidth = "92%";

                const title = document.createElement("div");
                title.textContent = "Report comment";
                title.className = "card-title";
                title.style.marginBottom = "8px";

                const textarea = document.createElement("textarea");
                textarea.style.width = "100%";
                textarea.style.height = "120px";
                textarea.style.marginBottom = "12px";
                textarea.className = "comment-input";

                const error = document.createElement("div");
                error.style.color = "crimson";
                error.style.marginBottom = "8px";
                error.className = "muted";

                const btnRow = document.createElement("div");
                btnRow.style.display = "flex";
                btnRow.style.justifyContent = "flex-end";
                btnRow.style.gap = "8px";

                const cancelBtn = document.createElement("button");
                cancelBtn.textContent = "Cancel";
                cancelBtn.className = "btn ghost";
                cancelBtn.onclick = () => {
                    root.style.visibility = "hidden";
                };

                const submitBtn = document.createElement("button");
                submitBtn.textContent = "Submit";
                submitBtn.className = "btn";
                submitBtn.onclick = async () => {
                    error.textContent = "";
                    const cb = root._api._onSubmit;
                    if (typeof cb === "function") {
                        const setError = (msg) => {
                            error.textContent = msg || "";
                        };
                        const setSubmitting = (v) => {
                            submitBtn.disabled = !!v;
                        };
                        try {
                            const result = await cb(
                                textarea.value,
                                setError,
                                setSubmitting,
                            );
                            if (result && result.success)
                                root.style.visibility = "hidden";
                        } catch (e) {
                            console.error("Report modal onSubmit error", e);
                            setError("Could not send report. Please try again later.");
                        }
                    }
                };

                btnRow.appendChild(cancelBtn);
                btnRow.appendChild(submitBtn);

                box.appendChild(title);
                box.appendChild(textarea);
                box.appendChild(error);
                box.appendChild(btnRow);
                root.appendChild(box);
                document.body.appendChild(root);

                const api = {
                    show: (reviewId, onSubmit) => {
                        textarea.value = "";
                        error.textContent = "";
                        root._api._onSubmit = onSubmit;
                        root.style.visibility = "visible";
                        textarea.focus();
                    },
                };
                root._api = api;
                return api;
            }

            // Expose comment loader so other UI bits (episode switch) can refresh comments
            window._loadComments = loadComments;

            function prependComment(review) {
                if (!commentsList) return;
                const placeholder = commentsList.querySelector(".comment-text");
                if (placeholder && placeholder.textContent) {
                    const txt = placeholder.textContent.toLowerCase();
                    if (
                        txt.includes("no comments") ||
                        txt.includes("loading comments") ||
                        txt.includes("failed to load")
                    ) {
                        commentsList.innerHTML = "";
                    }
                }
                commentsList.prepend(renderCommentRow(review));
            }

            async function postComment() {
                setError(null);
                const token = localStorage.getItem("token");
                if (!token) {
                    setError("You must be logged in to post a comment.");
                    return;
                }

                const MAX_COMMENT_LENGTH = 1000;
                const comment = commentInput ? commentInput.value.trim() : "";
                if (!comment) {
                    setError("Comment cannot be empty.");
                    return;
                }
                if (comment.length > MAX_COMMENT_LENGTH) {
                    setError(
                        `Comment cannot exceed ${MAX_COMMENT_LENGTH} characters.`,
                    );
                    return;
                }

                submitBtn.disabled = true;

                try {
                    const body = { comment };
                    if (_currentType === "tv") {
                        if (!_currentEpisodeId) {
                            setError(
                                "Unable to post comment: missing episode identifier.",
                            );
                            submitBtn.disabled = false;
                            return;
                        }
                        body.episodeId = _currentEpisodeId;
                    } else {
                        if (!_currentMovieId) {
                            setError("Unable to post comment: missing movie identifier.");
                            submitBtn.disabled = false;
                            return;
                        }
                        body.movieId = _currentMovieId;
                    }

                    const res = await fetch("/api/user/reviews", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            Authorization: `Bearer ${token}`,
                        },
                        body: JSON.stringify(body),
                    });

                    if (!res.ok) {
                        let message = "Unable to post comment.";

                        try {
                            const err = await res.json();
                            message = err.message || message;
                        } catch {
                            message = "You can't comment at this time.";
                        }

                        setError(message);
                        submitBtn.disabled = false;
                        return;
                    }

                    const created = await res.json();
                    if (created) {
                        prependComment(created);
                    }
                    commentInput.value = "";
                    if (charCount) charCount.textContent = "0/500";
                    updateSubmitState();
                } catch (e) {
                    console.error(e);
                    setError(`Unable to post comment. ${e.message || ""}`);
                    submitBtn.disabled = false;
                }
            }

            if (commentInput) {
                console.log("Comment input element found");
                commentInput.addEventListener("input", () => {
                    const len = commentInput.value.length;
                    if (charCount) charCount.textContent = `${len}/1000`;
                    updateSubmitState();
                });
            } else {
                console.warn("Comment input element not found");
            }

            if (submitBtn) {
                console.log("Submit button element found");
                submitBtn.addEventListener("click", () => {
                    console.log("Post Comment clicked");
                    const comment = commentInput ? commentInput.value.trim() : "";
                    if (!comment) {
                        setError("Comment cannot be empty.");
                        if (commentInput) {
                            commentInput.focus();
                        }
                        return;
                    }
                    postComment();
                });
            } else {
                console.warn("Submit button element not found");
            }

            updateSubmitState();
            loadComments();
        } catch (e) {
            console.error("Failed to initialize comments section", e);
            if (commentError) {
                commentError.textContent =
                    "Could not initialize comments. See console for details.";
                commentError.classList.remove("hidden");
            }
            if (commentsList) {
                commentsList.innerHTML = `<div class="comment-text">Failed to load comments.</div>`;
            }
        }
    }

    function setupMovie(movieData) {
        const videoUrl = movieData.srcFilm || movieData.src || "";
        const variants = Array.isArray(movieData.allowedVariants)
            ? movieData.allowedVariants
            : [];
        const isPremiumUser = movieData.premiumUser === true;

        renderQualityDropdown(videoUrl, variants, isPremiumUser);
        loadVideo(videoUrl, window._resumeSec || 0);
    }
    function setupTVSeries(
        movieData,
        seasonsData,
        selectedSeason,
        selectedEpisode,
    ) {
        const selector = document.getElementById("episodeSelector");
        const buttonsContainer = document.getElementById("episodeButtons");

        // Show episode selector
        selector.classList.remove("hidden");

        // Clear existing buttons
        buttonsContainer.innerHTML = "";

        // Sort seasons
        const sortedSeasons = [...seasonsData].sort(
            (a, b) => (a.seasonNumber || 0) - (b.seasonNumber || 0),
        );

        // Group episodes by season for better organization
        const episodesBySeason = {};
        sortedSeasons.forEach((season) => {
            const publishedEpisodes = (season.episodes || []).filter(
                (ep) => ep.published,
            );
            if (publishedEpisodes.length > 0) {
                episodesBySeason[season.seasonNumber] = publishedEpisodes.sort(
                    (a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0),
                );
            }
        });

        // Create buttons for each season's episodes
        Object.keys(episodesBySeason)
            .sort((a, b) => Number(a) - Number(b))
            .forEach((seasonNum) => {
                const episodes = episodesBySeason[seasonNum];

                // Add season header if there are multiple seasons
                if (Object.keys(episodesBySeason).length > 1) {
                    const seasonHeader = document.createElement("div");
                    seasonHeader.className = "season-header";
                    seasonHeader.textContent = `Season ${seasonNum}`;
                    seasonHeader.style.fontSize = "14px";
                    seasonHeader.style.fontWeight = "600";
                    seasonHeader.style.color = "var(--text-subtle)";
                    seasonHeader.style.marginBottom = "8px";
                    seasonHeader.style.marginTop = "12px";
                    buttonsContainer.appendChild(seasonHeader);
                }

                // Create episode buttons
                episodes.forEach((ep) => {
                    const button = document.createElement("button");
                    button.className = "episode-button";
                    button.textContent = `Ep ${ep.episodeNumber}`;
                    button.dataset.season = seasonNum;
                    button.dataset.episode = ep.episodeNumber;
                    // Keep the DB identifier around for comments/history
                    button.dataset.episodeId =
                        ep.id || ep.episodeId || ep.episodeNumber;

                    // Check if this is the selected episode
                    const isSelected =
                        selectedSeason == seasonNum &&
                        selectedEpisode == ep.episodeNumber;
                    if (isSelected) {
                        button.classList.add("active");
                        _currentEpisodeId = button.dataset.episodeId
                            ? parseInt(button.dataset.episodeId, 10)
                            : null;
                    }

                    button.addEventListener("click", () => {
                        // Remove active class from all buttons
                        document.querySelectorAll(".episode-button").forEach((btn) => {
                            btn.classList.remove("active");
                        });

                        // Add active class to clicked button
                        button.classList.add("active");

                        // Update current episode id for comments & history tracking
                        _currentEpisodeId = button.dataset.episodeId
                            ? parseInt(button.dataset.episodeId, 10)
                            : null;

                        // Load the episode video — only resume on the initial auto-click,
                        // not when the user manually picks a different episode
                        const resumeOnLoad = window._resumeSec || 0;
                        window._resumeSec = 0; // clear after first use
                        if (ep && (ep.srcFilm || ep.src)) {
                            const videoUrl = ep.srcFilm || ep.src;
                            const variants = Array.isArray(ep.allowedVariants)
                                ? ep.allowedVariants
                                : [];
                            const isPremiumUser = ep.premiumUser === true;

                            renderQualityDropdown(videoUrl, variants, isPremiumUser);
                            loadVideo(videoUrl, resumeOnLoad);
                        } else {
                            renderQualityDropdown("", []);
                            loadVideo("", 0);
                        }

                        // Refresh episode-specific comments when switching
                        if (typeof window._loadComments === "function") {
                            window._loadComments();
                        }
                    });

                    buttonsContainer.appendChild(button);
                });
            });

        // Auto-select first episode if no specific episode selected
        if (!selectedSeason || !selectedEpisode) {
            const firstSeasonNum = Object.keys(episodesBySeason)[0];
            const firstEpisode = episodesBySeason[firstSeasonNum]?.[0];

            if (firstEpisode) {
                // Find and click the first episode button
                const firstButton = buttonsContainer.querySelector(
                    `[data-season="${firstSeasonNum}"][data-episode="${firstEpisode.episodeNumber}"]`,
                );
                if (firstButton) {
                    firstButton.click();
                } else if (firstEpisode.srcFilm || firstEpisode.src) {
                    const videoUrl = firstEpisode.srcFilm || firstEpisode.src;
                    const variants = Array.isArray(firstEpisode.allowedVariants)
                        ? firstEpisode.allowedVariants
                        : [];
                    const isPremiumUser = firstEpisode.premiumUser === true;

                    renderQualityDropdown(videoUrl, variants, isPremiumUser);
                    loadVideo(videoUrl, window._resumeSec || 0);
                    window._resumeSec = 0;
                }
            }
        } else {
            // Load the specified episode
            const season = sortedSeasons.find(
                (s) => s.seasonNumber == selectedSeason,
            );
            const ep = season?.episodes?.find(
                (e) => e.episodeNumber == selectedEpisode && e.published,
            );
            if (ep && (ep.srcFilm || ep.src)) {
                const videoUrl = ep.srcFilm || ep.src;
                const variants = Array.isArray(ep.allowedVariants)
                    ? ep.allowedVariants
                    : [];
                const isPremiumUser = ep.premiumUser === true;

                renderQualityDropdown(videoUrl, variants, isPremiumUser);
                loadVideo(videoUrl, window._resumeSec || 0);
                window._resumeSec = 0;
            }
        }
    }

    // ── YouTube IFrame Player API ──────────────────────────────────────
    // We use the official YT.Player API (not a plain iframe) because it is
    // the ONLY way to receive play/pause/end state change events reliably.
    // A plain iframe with enablejsapi=1 does NOT fire postMessage events
    // unless the player was created through new YT.Player() and has had
    // addEventListener() called on it. Without the API the tracker never
    // fires and nothing is ever saved to the database.

    let _ytPlayer = null; // YT.Player instance
    let _ytReady = false; // true once onReady fires
    let _pendingLoad = null; // { videoId, startSec } queued before API ready
    let _ytStartSec = 0; // start position for the current video

    // Called by the YT API script once it has loaded
    window.onYouTubeIframeAPIReady = function () {
        _ytReady = true;
        if (_pendingLoad) {
            _createPlayer(_pendingLoad.videoId, _pendingLoad.startSec);
            _pendingLoad = null;
        }
    };

    function _createPlayer(videoId, startSec) {
        _ytStartSec = Math.floor(startSec || 0); // saved for onReady seekTo()

        // Destroy previous player if one exists (e.g. episode switch)
        if (_ytPlayer) {
            try {
                _ytPlayer.destroy();
            } catch (e) {}
            _ytPlayer = null;
            const container = document.querySelector(".video-container");
            container.innerHTML = "";
            const div = document.createElement("div");
            div.id = "videoPlayer";
            div.className = "video-player";
            container.appendChild(div);
        }
        _ytPlayer = new YT.Player("videoPlayer", {
            width: "100%",
            height: "100%",
            videoId: videoId,
            playerVars: {
                rel: 0,
                modestbranding: 1,
            },
            events: {
                onReady: _onPlayerReady,
                onStateChange: _onStateChange,
            },
        });
    }

    function _onPlayerReady(event) {
        // Get exact duration straight from the YouTube player API
        const ytDuration = event.target.getDuration();
        if (ytDuration && ytDuration > 0) {
            _durationSec = Math.floor(ytDuration);
        }

        // Seek to saved position — seekTo() is reliable without autoplay,
        // unlike playerVars.start which YouTube ignores when paused on load
        if (_ytStartSec > 0) {
            event.target.seekTo(_ytStartSec, true);
        }
    }

    function _onStateChange(event) {
        const state = event.data;
        // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0, BUFFERING=3
        if (state === YT.PlayerState.PLAYING) {
            if (_firstPlay) {
                _firstPlay = false;
                _doSave(); // immediate save creates the DB record right away
            }
        } else if (
            state === YT.PlayerState.PAUSED ||
            state === YT.PlayerState.ENDED
        ) {
            _doSave(); // save the exact position whenever user pauses or video ends
        }
    }

    let _nativeVideo = null; // <video> element for direct MP4/HLS

    function _prepareVideoContainer() {
        const container = document.querySelector(".video-container");
        const existingOverlay = document.getElementById("adOverlay");
        container.innerHTML = "";
        if (existingOverlay) {
            container.appendChild(existingOverlay);
        }
        return container;
    }

    function loadVideo(videoUrl, startSec) {
        const start = Math.floor(startSec || 0);

        if (!videoUrl || videoUrl.trim() === "") {
            if (_ytPlayer) { try { _ytPlayer.stopVideo(); } catch (e) {} }
            return;
        }

        _nativeVideo = null;

        if (videoUrl.includes("youtube.com") || videoUrl.includes("youtu.be")) {
            const videoId = extractYouTubeId(videoUrl);
            if (!videoId) return;
            if (_ytReady) {
                _createPlayer(videoId, start);
            } else {
                _pendingLoad = { videoId, startSec: start };
                if (!document.getElementById("yt-api-script")) {
                    const tag = document.createElement("script");
                    tag.id = "yt-api-script";
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.head.appendChild(tag);
                }
            }
        } else if (videoUrl.includes("vimeo.com")) {
            const videoId = extractVimeoId(videoUrl);
            if (videoId) {
                const container = _prepareVideoContainer();
                container.insertAdjacentHTML("afterbegin", `<iframe id="videoPlayer" class="video-player" allowfullscreen
                          src="https://player.vimeo.com/video/${videoId}?api=1#t=${start}">
                       </iframe>`);
                if (_firstPlay) { _firstPlay = false; _doSave(); }
            }
        } else if (/\.(mp4|webm|ogg|mov)([\?#]|$)/i.test(videoUrl) || videoUrl.includes(".m3u8")) {
            const container = _prepareVideoContainer();
            const vid = document.createElement("video");
            vid.id = "videoPlayer";
            vid.className = "video-player";
            vid.controls = true;
            vid.style.background = "#000";

            container.insertBefore(vid, container.firstChild);
            _nativeVideo = vid;

            if (videoUrl.includes(".m3u8")) {
                if (vid.canPlayType("application/vnd.apple.mpegurl")) {
                    vid.src = videoUrl;
                } else if (window.Hls && Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(videoUrl);
                    hls.attachMedia(vid);
                } else {
                    console.error("HLS is not supported in this browser");
                }
            } else {
                vid.src = videoUrl;
            }

            vid.addEventListener("loadedmetadata", () => {
                if (vid.duration > 0) _durationSec = Math.floor(vid.duration);
                if (start > 0) vid.currentTime = start;
            }, { once: true });

            if (_firstPlay) { _firstPlay = false; _doSave(); }
        } else {
            // Generic embedded iframe
            const container = document.querySelector(".video-container");
            container.innerHTML = `<iframe id="videoPlayer" class="video-player" allowfullscreen
                      src="${start > 0 ? videoUrl + '#t=' + start : videoUrl}">
                   </iframe>`;
            if (_firstPlay) { _firstPlay = false; _doSave(); }
        }
    }

    function extractYouTubeId(url) {
        const patterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/,
            /youtube\.com\/embed\/([^&\n?#]+)/,
        ];
        for (const pattern of patterns) {
            const match = url.match(pattern);
            if (match) return match[1];
        }
        return null;
    }

    function extractVimeoId(url) {
        const match = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
        return match ? match[1] : null;
    }

    // ── Watch History Tracker ──────────────────────────────────────────

    const _histParams = new URLSearchParams(window.location.search);
    const _histId     = _histParams.get("id");
    const _histType   = _histParams.get("type") || "movie";
    const _histToken  = localStorage.getItem("token");
    const _tParam     = _histParams.get("t");

    let _durationSec = 0;
    let _firstPlay   = true;

    window._resumeSec = 0;

    window._startHistoryTracker = function (durationSeconds) {
        _durationSec = durationSeconds || 0;
    };

    // ── Current time — works for YouTube, native <video>, and iframes ──
    function _getCurrentTime() {
        try {
            if (_ytPlayer && typeof _ytPlayer.getCurrentTime === "function") {
                return Math.floor(_ytPlayer.getCurrentTime()) || 0;
            }
            if (_nativeVideo) {
                return Math.floor(_nativeVideo.currentTime) || 0;
            }
        } catch (e) {}
        return 0;
    }

    // ── Duration — prefers live player value over stored estimate ──────
    function _getLiveDuration() {
        try {
            if (_ytPlayer && typeof _ytPlayer.getDuration === "function") {
                const d = _ytPlayer.getDuration();
                if (d > 0) return Math.floor(d);
            }
            if (_nativeVideo && _nativeVideo.duration > 0) {
                return Math.floor(_nativeVideo.duration);
            }
        } catch (e) {}
        return _durationSec || 0;
    }

    // ── Resolve which content is currently playing ─────────────────────
    // When a TV episode is switched, _currentMovieId / _currentEpisodeId
    // are updated by setupTVSeries — use those instead of the URL ?id=.
    function _buildPayload() {
        const currentTime = _getCurrentTime();
        const duration    = _getLiveDuration();
        if (duration > 0) _durationSec = duration; // keep in sync
        const progress    = duration > 0 ? Math.min(currentTime, duration) : currentTime;

        // Determine which entity to attach the record to
        if (_histType === "tv") {
            const epId = _currentEpisodeId || parseInt(_histId);
            return { progressSec: progress, durationSec: duration, episodeId: epId };
        } else {
            const mvId = _currentMovieId || parseInt(_histId);
            return { progressSec: progress, durationSec: duration, movieId: mvId };
        }
    }

    function _doSave() {
        if (!_histToken) return;
        const payload = _buildPayload();
        // Need at least one content id
        if (!payload.movieId && !payload.episodeId) return;
        fetch("/api/user/history/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + _histToken,
            },
            body: JSON.stringify(payload),
        }).catch(() => {});
    }

    // Periodic save every 15 s — fires for all player types once playing has started
    setInterval(() => {
        if (!_firstPlay) _doSave();
    }, 15_000);

    // Save on tab/browser close (synchronous XHR — sendBeacon can't set Auth header)
    window.addEventListener("beforeunload", () => {
        if (_firstPlay || !_histToken) return;
        const payload = _buildPayload();
        if (!payload.movieId && !payload.episodeId) return;
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/user/history/save", false);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + _histToken);
        try { xhr.send(JSON.stringify(payload)); } catch (e) {}
    });

    async function _initAndStart() {
        if (_tParam !== null && _tParam !== "") {
            window._resumeSec = parseFloat(_tParam) || 0;
        }

        // Load saved progress from DB to resume from where the user left off
        if (_histId && _histToken) {
            try {
                const res = await fetch("/api/user/history", {
                    headers: { Authorization: "Bearer " + _histToken },
                });
                if (res.ok) {
                    const list = await res.json();
                    // For TV, _histId is the series ID. Match history by the ?episode= param (episode DB id).
                    const _episodeParam = _histParams.get("episode");
                    const rec = list.find(
                        (h) =>
                            (_histType === "movie" && String(h.movieId) === String(_histId)) ||
                            (_histType === "tv" && _episodeParam && String(h.episodeId) === String(_episodeParam)),
                    );
                    if (rec) {
                        const savedPos = rec.progressSec || 0;
                        if (rec.durationSec > 0) _durationSec = rec.durationSec;
                        if (!window._resumeSec) window._resumeSec = savedPos;
                    }
                }
            } catch (e) {
                console.warn("Could not load saved progress:", e);
            }
        }
        loadWatchPage();
    }

    // ── PRE-ROLL ADS FOR NON-PREMIUM USERS ────────────────────────────
    let _isAdPlaying = false;
    let _adCountdownInterval = null;
    let _adFinishHandled = false;
    let _mainContentContext = null;
    let _adSkipUnlocked = false;
    let _adMaxAllowedTime = 0;
    let _adStartedOnce = false;
    let _adAutoplayRecoveryBound = false;
    let _adUserUnmuted = false;

    function _clearAdCountdown() {
        if (_adCountdownInterval) {
            clearInterval(_adCountdownInterval);
            _adCountdownInterval = null;
        }
    }

    function _getAdEls() {
        return {
            overlay: document.getElementById("adOverlay"),
            counter: document.getElementById("adCounter"),
            skipBtn: document.getElementById("skipAdBtn"),
            unmuteBtn: document.getElementById("unmuteAdBtn"),
            hint: document.getElementById("adCenterHint"),
            qualityWrap: document.getElementById("qualityWrap"),
        };
    }

    function _syncAdMuteButton() {
        const { unmuteBtn } = _getAdEls();
        if (!unmuteBtn) return;
        if (!_isAdPlaying) {
            unmuteBtn.style.display = "none";
            unmuteBtn.textContent = "🔊 Unmute";
            return;
        }

        unmuteBtn.style.display = "inline-flex";
        const muted = !_nativeVideo || _nativeVideo.muted;
        unmuteBtn.textContent = muted ? "🔊 Unmute" : "🔇 Mute";
    }

    function _setAdMutedState(shouldMute) {
        if (_nativeVideo) {
            _nativeVideo.muted = shouldMute;
            _nativeVideo.defaultMuted = shouldMute;
            if (!shouldMute && (_nativeVideo.volume === 0 || Number.isNaN(_nativeVideo.volume))) {
                _nativeVideo.volume = 1;
            }
        }
        _adUserUnmuted = !shouldMute;
        _syncAdMuteButton();
    }

    function _showAdUi(ad) {
        const { overlay, counter, skipBtn, unmuteBtn, hint, qualityWrap } = _getAdEls();
        _adUserUnmuted = false;
        if (overlay) overlay.classList.add("active");
        if (hint) {
            hint.style.display = "block";
            hint.textContent = ad?.title
                ? `Playing ad: ${ad.title}`
                : "Playing advertisement...";
        }
        if (counter) {
            counter.textContent = "Advertisement";
        }
        if (skipBtn) {
            skipBtn.style.display = "none";
            skipBtn.disabled = true;
            skipBtn.textContent = "Skip Ad";
        }
        if (unmuteBtn) {
            unmuteBtn.style.display = "inline-flex";
            unmuteBtn.textContent = "🔊 Unmute";
            unmuteBtn.onclick = () => {
                if (!_isAdPlaying) return;
                _setAdMutedState(_nativeVideo ? !_nativeVideo.muted : false);
            };
        }
        if (qualityWrap) {
            qualityWrap.style.display = "none";
        }
    }

    function _hideAdUi() {
        const { overlay, hint, skipBtn, unmuteBtn } = _getAdEls();
        if (overlay) overlay.classList.remove("active");
        if (hint) {
            hint.style.display = "none";
            hint.onclick = null;
        }
        if (skipBtn) {
            skipBtn.style.display = "none";
            skipBtn.disabled = true;
            skipBtn.textContent = "Skip Ad";
            skipBtn.onclick = null;
        }
        if (unmuteBtn) {
            unmuteBtn.style.display = "none";
            unmuteBtn.textContent = "🔊 Unmute";
            unmuteBtn.onclick = null;
        }
    }

    function _bindAdAutoplayRecovery() {
        if (_adAutoplayRecoveryBound) return;
        _adAutoplayRecoveryBound = true;

        const tryResumeAd = async () => {
            if (!_isAdPlaying || !_nativeVideo) return;
            try {
                if (!_adUserUnmuted) {
                    _nativeVideo.muted = true;
                    _nativeVideo.defaultMuted = true;
                }
                await _nativeVideo.play();
                _syncAdMuteButton();
            } catch (_) {}
        };

        ["pointerdown", "click", "keydown", "touchstart"].forEach((evt) => {
            window.addEventListener(evt, tryResumeAd, { passive: true, capture: true });
        });

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                tryResumeAd();
            }
        });

        window.addEventListener("pageshow", () => {
            tryResumeAd();
        });
    }

    async function fetchActivePreRollAd() {
        const candidates = [
            "/api/public/ads/pre-roll",
            "/api/admin/ads/api/public/ads/pre-roll"
        ];

        for (const url of candidates) {
            try {
                const res = await fetch(url, { headers: { ...authHeaders() } });
                if (res.status === 204) return null;
                if (!res.ok) continue;
                const data = await res.json();
                if (data && data.srcFilm) return data;
            } catch (e) {
                console.warn("Failed to fetch pre-roll ad from", url, e);
            }
        }
        return null;
    }

    function _finishAdAndPlayMain() {
        if (_adFinishHandled) return;
        _adFinishHandled = true;
        _isAdPlaying = false;
        _adSkipUnlocked = false;
        _adMaxAllowedTime = 0;
        _adUserUnmuted = false;
        _clearAdCountdown();
        _hideAdUi();

        const ctx = _mainContentContext;
        _mainContentContext = null;

        if (!ctx) return;

        renderQualityDropdown(ctx.videoUrl, ctx.variants, ctx.isPremiumUser);
        loadVideo(ctx.videoUrl, ctx.startSec || 0);
        setTimeout(() => {
            if (_nativeVideo) {
                _nativeVideo.muted = false;
                _nativeVideo.defaultMuted = false;
                _nativeVideo.controls = true;
                _nativeVideo.controlsList = "nodownload noplaybackrate noremoteplayback";
            }
        }, 0);
    }

    function _armSkippableCountdown(ad) {
        const { counter, skipBtn } = _getAdEls();
        const allowSkip = Boolean(ad && ad.skippable);
        const skipAfter = Math.max(0, Number(ad?.skipAfterSeconds || 0));
        _adSkipUnlocked = false;

        _clearAdCountdown();

        if (skipBtn) {
            skipBtn.onclick = () => {
                if (!_adSkipUnlocked) return;
                _finishAdAndPlayMain();
            };
        }

        if (!allowSkip) {
            if (counter) counter.textContent = "Advertisement";
            if (skipBtn) {
                skipBtn.style.display = "none";
                skipBtn.disabled = true;
                skipBtn.textContent = "Skip Ad";
            }
            return;
        }

        if (skipAfter <= 0) {
            _adSkipUnlocked = true;
            if (counter) counter.textContent = "You can skip this ad";
            if (skipBtn) {
                skipBtn.style.display = "inline-flex";
                skipBtn.disabled = false;
                skipBtn.textContent = "Skip Ad";
            }
            return;
        }

        const startedAt = Date.now();
        if (counter) counter.textContent = `Skip in ${skipAfter}s`;
        if (skipBtn) {
            skipBtn.style.display = "inline-flex";
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip in ${skipAfter}s`;
        }

        _adCountdownInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startedAt) / 1000);
            const remain = Math.max(0, skipAfter - elapsed);

            if (remain > 0) {
                if (counter) counter.textContent = `Skip in ${remain}s`;
                if (skipBtn) skipBtn.textContent = `Skip in ${remain}s`;
                return;
            }

            _clearAdCountdown();
            _adSkipUnlocked = true;
            if (counter) counter.textContent = "You can skip this ad";
            if (skipBtn) {
                skipBtn.style.display = "inline-flex";
                skipBtn.disabled = false;
                skipBtn.textContent = "Skip Ad";
            }
        }, 250);
    }

    function _lockAdSeeking(video) {
        if (!video) return;

        const syncAllowedTime = () => {
            if (!_isAdPlaying) return;
            const now = Number(video.currentTime || 0);
            if (Number.isFinite(now) && now > _adMaxAllowedTime) {
                _adMaxAllowedTime = now;
            }
        };

        const forceBack = () => {
            if (!_isAdPlaying) return;
            const now = Number(video.currentTime || 0);
            if (Number.isFinite(now) && now > _adMaxAllowedTime + 0.2) {
                video.currentTime = Math.max(0, _adMaxAllowedTime);
            }
        };

        video.addEventListener("timeupdate", syncAllowedTime);
        video.addEventListener("seeking", forceBack);
        video.addEventListener("seeked", forceBack);
        video.addEventListener("mousedown", forceBack);
        video.addEventListener("touchstart", forceBack, { passive: true });
        video.addEventListener("contextmenu", (e) => {
            if (_isAdPlaying) e.preventDefault();
        });
    }

    function _playPreRollAd(ad) {
        _adFinishHandled = false;
        _isAdPlaying = true;
        _adSkipUnlocked = false;
        _adMaxAllowedTime = 0;
        _adStartedOnce = false;
        _showAdUi(ad);
        _armSkippableCountdown(ad);
        _bindAdAutoplayRecovery();

        loadVideo(ad.srcFilm, 0);

        const waitForVideo = () => {
            if (!_nativeVideo) {
                setTimeout(waitForVideo, 100);
                return;
            }

            _nativeVideo.controls = false;
            _nativeVideo.autoplay = true;
            _nativeVideo.preload = "auto";
            _nativeVideo.playsInline = true;
            _nativeVideo.defaultMuted = true;
            _nativeVideo.muted = true;
            _nativeVideo.volume = 1;
            _nativeVideo.setAttribute("autoplay", "autoplay");
            _nativeVideo.setAttribute("muted", "muted");
            _nativeVideo.setAttribute("playsinline", "playsinline");
            _nativeVideo.controlsList = "nodownload noplaybackrate nofullscreen noremoteplayback";
            _nativeVideo.disablePictureInPicture = true;
            _syncAdMuteButton();
            _nativeVideo.addEventListener("loadedmetadata", () => {
                _adMaxAllowedTime = 0;
            }, { once: true });
            _nativeVideo.addEventListener("playing", () => {
                _adStartedOnce = true;
                const { hint } = _getAdEls();
                if (hint) {
                    hint.style.display = "none";
                    hint.onclick = null;
                }
            }, { once: true });
            _lockAdSeeking(_nativeVideo);

            _nativeVideo.addEventListener("ended", _finishAdAndPlayMain, { once: true });
            _nativeVideo.addEventListener("error", () => {
                console.warn("Ad playback failed, falling back to main content");
                _finishAdAndPlayMain();
            }, { once: true });

            const tryPlayMuted = async () => {
                try {
                    if (!_adUserUnmuted) {
                        _nativeVideo.defaultMuted = true;
                        _nativeVideo.muted = true;
                    }
                    await _nativeVideo.play();
                    _syncAdMuteButton();
                } catch (e) {
                    console.warn("Autoplay for ad was blocked:", e);
                    const { hint } = _getAdEls();
                    if (hint) {
                        hint.style.display = "block";
                        hint.textContent = "Advertisement is ready. Click anywhere to continue.";
                        hint.onclick = async () => {
                            try {
                                if (!_adUserUnmuted) {
                                    _nativeVideo.defaultMuted = true;
                                    _nativeVideo.muted = true;
                                }
                                await _nativeVideo.play();
                                _syncAdMuteButton();
                                hint.style.display = "none";
                                hint.onclick = null;
                            } catch (_) {}
                        };
                    }
                }
            };

            tryPlayMuted();
        };

        waitForVideo();
    }

    async function playMainContentWithOptionalAd({ videoUrl, startSec = 0, variants = [], isPremiumUser = false }) {
        const normalizedUrl = (videoUrl || "").trim();

        if (!normalizedUrl) {
            renderQualityDropdown("", [], isPremiumUser);
            loadVideo("", 0);
            return;
        }

        _mainContentContext = {
            videoUrl: normalizedUrl,
            startSec,
            variants,
            isPremiumUser,
        };

        if (isPremiumUser) {
            _isAdPlaying = false;
            _hideAdUi();
            renderQualityDropdown(normalizedUrl, variants, isPremiumUser);
            loadVideo(normalizedUrl, startSec || 0);
            setTimeout(() => {
                if (_nativeVideo) {
                    _nativeVideo.muted = false;
                    _nativeVideo.defaultMuted = false;
                    _nativeVideo.controls = true;
                }
            }, 0);
            _mainContentContext = null;
            return;
        }

        const ad = await fetchActivePreRollAd();
        if (!ad || !ad.srcFilm) {
            _isAdPlaying = false;
            _hideAdUi();
            renderQualityDropdown(normalizedUrl, variants, isPremiumUser);
            loadVideo(normalizedUrl, startSec || 0);
            setTimeout(() => {
                if (_nativeVideo) {
                    _nativeVideo.muted = false;
                    _nativeVideo.defaultMuted = false;
                    _nativeVideo.controls = true;
                }
            }, 0);
            _mainContentContext = null;
            return;
        }

        _playPreRollAd(ad);
    }

    function setupMovie(movieData) {
        const videoUrl = movieData.srcFilm || movieData.src || "";
        const variants = Array.isArray(movieData.allowedVariants)
            ? movieData.allowedVariants
            : [];
        const isPremiumUser = movieData.premiumUser === true;

        playMainContentWithOptionalAd({
            videoUrl,
            startSec: window._resumeSec || 0,
            variants,
            isPremiumUser
        });
    }

    function setupTVSeries(
        movieData,
        seasonsData,
        selectedSeason,
        selectedEpisode,
    ) {
        const selector = document.getElementById("episodeSelector");
        const buttonsContainer = document.getElementById("episodeButtons");

        selector.classList.remove("hidden");
        buttonsContainer.innerHTML = "";

        const sortedSeasons = [...(seasonsData || [])].sort(
            (a, b) => (a.seasonNumber || 0) - (b.seasonNumber || 0),
        );

        const episodesBySeason = {};
        sortedSeasons.forEach((season) => {
            const publishedEpisodes = (season.episodes || []).filter((ep) => ep.published);
            if (publishedEpisodes.length > 0) {
                episodesBySeason[season.seasonNumber] = publishedEpisodes.sort(
                    (a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0),
                );
            }
        });

        const loadEpisodePlayback = (ep, resumeSec = 0) => {
            if (ep && (ep.srcFilm || ep.src)) {
                const videoUrl = ep.srcFilm || ep.src;
                const variants = Array.isArray(ep.allowedVariants) ? ep.allowedVariants : [];
                const isPremiumUser = ep.premiumUser === true;

                playMainContentWithOptionalAd({
                    videoUrl,
                    startSec: resumeSec,
                    variants,
                    isPremiumUser
                });
            } else {
                renderQualityDropdown("", [], false);
                loadVideo("", 0);
            }
        };

        Object.keys(episodesBySeason)
            .sort((a, b) => Number(a) - Number(b))
            .forEach((seasonNum) => {
                const episodes = episodesBySeason[seasonNum];

                if (Object.keys(episodesBySeason).length > 1) {
                    const seasonHeader = document.createElement("div");
                    seasonHeader.className = "season-header";
                    seasonHeader.textContent = `Season ${seasonNum}`;
                    buttonsContainer.appendChild(seasonHeader);
                }

                episodes.forEach((ep) => {
                    const button = document.createElement("button");
                    button.className = "episode-button";
                    button.textContent = `Ep ${ep.episodeNumber}`;
                    button.dataset.season = seasonNum;
                    button.dataset.episode = ep.episodeNumber;
                    button.dataset.episodeId = ep.id || ep.episodeId || ep.episodeNumber;

                    const isSelected =
                        selectedSeason == seasonNum && selectedEpisode == ep.episodeNumber;
                    if (isSelected) {
                        button.classList.add("active");
                        _currentEpisodeId = button.dataset.episodeId
                            ? parseInt(button.dataset.episodeId, 10)
                            : null;
                    }

                    button.addEventListener("click", () => {
                        document.querySelectorAll(".episode-button").forEach((btn) => {
                            btn.classList.remove("active");
                        });
                        button.classList.add("active");

                        _currentEpisodeId = button.dataset.episodeId
                            ? parseInt(button.dataset.episodeId, 10)
                            : null;

                        const resumeOnLoad = window._resumeSec || 0;
                        window._resumeSec = 0;

                        loadEpisodePlayback(ep, resumeOnLoad);

                        if (typeof window._loadComments === "function") {
                            window._loadComments();
                        }
                    });

                    buttonsContainer.appendChild(button);
                });
            });

        if (!selectedSeason || !selectedEpisode) {
            const firstSeasonNum = Object.keys(episodesBySeason)[0];
            const firstEpisode = episodesBySeason[firstSeasonNum]?.[0];

            if (firstEpisode) {
                const firstButton = buttonsContainer.querySelector(
                    `[data-season="${firstSeasonNum}"][data-episode="${firstEpisode.episodeNumber}"]`,
                );
                if (firstButton) {
                    firstButton.click();
                } else {
                    loadEpisodePlayback(firstEpisode, window._resumeSec || 0);
                    window._resumeSec = 0;
                }
            }
        } else {
            const season = sortedSeasons.find((s) => s.seasonNumber == selectedSeason);
            const ep = season?.episodes?.find(
                (e) => e.episodeNumber == selectedEpisode && e.published,
            );
            if (ep) {
                loadEpisodePlayback(ep, window._resumeSec || 0);
                window._resumeSec = 0;
            }
        }
    }

    function _buildPayload() {
        if (_isAdPlaying) return null;

        const currentTime = _getCurrentTime();
        const duration = _getLiveDuration();
        if (duration > 0) _durationSec = duration;
        const progress = duration > 0 ? Math.min(currentTime, duration) : currentTime;

        if (_histType === "tv") {
            const epId = _currentEpisodeId || parseInt(_histId);
            return { progressSec: progress, durationSec: duration, episodeId: epId };
        } else {
            const mvId = _currentMovieId || parseInt(_histId);
            return { progressSec: progress, durationSec: duration, movieId: mvId };
        }
    }

    function _doSave() {
        if (_isAdPlaying || !_histToken) return;
        const payload = _buildPayload();
        if (!payload || (!payload.movieId && !payload.episodeId)) return;
        fetch("/api/user/history/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + _histToken,
            },
            body: JSON.stringify(payload),
        }).catch(() => {});
    }


    _initAndStart();
</script>
