<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MovieZone | Contact</title>

    <style>
        :root {
            --bg-primary: #020617;
            --bg-elevated: #020617;
            --accent: #f97316;
            --accent-soft: rgba(249, 115, 22, 0.18);
            --accent-strong: rgba(249, 115, 22, 0.45);
            --text-main: #e5e7eb;
            --text-subtle: #9ca3af;
            --border-soft: rgba(148, 163, 184, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.06), transparent 55%),
            radial-gradient(circle at 100% 100%, rgba(37, 99, 235, 0.3), transparent 60%),
            linear-gradient(135deg, #020617, #030712 50%, #020617);
            color: var(--text-main);
            min-height: 100vh;
        }

        .page-shell {
            max-width: 1320px;
            margin: 0 auto;
            padding: 20px 28px 48px;
        }

        /* NAVBAR (Reused from homepage) */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-radius: 18px;
            background: radial-gradient(circle at 0 0, rgba(148, 163, 184, 0.35), transparent 58%),
            rgba(15, 23, 42, 0.96);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.45),
            0 18px 40px rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(18px);
            position: sticky;
            top: 12px;
            z-index: 20;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #f97316, #e11d48 55%, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(248, 113, 113, 0.55);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        .nav-title {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .nav-title-main {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
        }

        .nav-title-sub {
            font-size: 11px;
            color: var(--text-subtle);
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            margin-right: 10px;

        }

        .nav-link {
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 999px;
            color: var(--text-subtle);
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.16s ease;
            cursor: pointer;
            background: none;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--text-main);
            border-color: rgba(148, 163, 184, 0.6);
            background: rgba(15, 23, 42, 0.9);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            border-color: transparent;
            box-shadow: 0 12px 22px rgba(248, 113, 113, 0.6),
            0 0 0 1px rgba(248, 113, 113, 0.7);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .nav-username {
            color: var(--text-subtle);
        }

        .nav-link-logout {
            text-transform: none;
            font-weight: 500;
            border-color: rgba(248, 113, 22, 0.6);
            color: #e91000;
        }

        .nav-link-logout:hover {
            background: rgba(15, 23, 42, 1);
            border-color: rgba(248, 113, 22, 0.9);
        }

        /* PREMIUM BADGE */

        .badge-premium {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            background: rgba(234, 179, 8, 0.12);
            border: 1px solid rgba(250, 204, 21, 0.7);
            color: #facc15;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge-premium-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #facc15;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.32);
        }

        /* RESPONSIVE NAVBAR */

        @media (max-width: 900px) {
            .navbar {
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-center {
                order: 3;
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .page-shell {
                padding-inline: 14px;
            }
        }

        /* CONTACT CARD */
        .card {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid var(--border-soft);
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 24px 55px rgba(15, 23, 42, 0.98);
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, #f97316, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            background: #0b1220;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: none;
            height: 140px;
        }

        input[type="file"] {
            background: #0b1220;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 20px rgba(248, 113, 113, 0.4);
            transition: transform 0.15s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 14px;
            color: #93c5fd;
            text-align: center;
            font-size: 14px;
        }

        .err {
            margin-top: 14px;
            color: #fca5a5;
            text-align: center;
            font-size: 14px;
        }

        /* FOOTER (Reused from homepage) */
        .site-footer {
            margin-top: 60px;
            padding: 28px 0 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.25);
        }

        .footer-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #f97316, #e11d48 55%, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .footer-title {
            font-weight: 700;
            letter-spacing: 0.06em;
            font-size: 13px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links a {
            color: var(--text-subtle);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.15s ease;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        .footer-bottom {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            font-size: 12px;
            color: var(--text-subtle);
            text-align: center;
        }

        @media (max-width: 640px) {
            .card {
                padding: 20px;
                margin: 20px;
            }
        }

        .lang-dropdown {
            position: relative;
        }

        .lang-current {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid transparent;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;

        }

        .lang-current img {
            width: 20px;
            height: 20px;
            object-fit: cover;
            border-radius: 50%;
        }

        .lang-current:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* dropdown */

        .lang-menu {
            position: absolute;
            top: 42px;
            right: 0;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 12px;
            width: 150px;
            padding: 6px;
            display: none;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .lang-item img {
            width: 20px;
            height: 20px;
            object-fit: cover;
            border-radius: 50%;

        }

        .lang-item:hover {
            background: rgba(148, 163, 184, 0.12);
        }

        .lang-dropdown.open .lang-menu {
            display: block;
        }
    </style>
</head>
<body>

<div class="page-shell">
    <header class="navbar">

        <a href="homepage.html" class="nav-left" style="text-decoration:none;color:inherit;">
            <div class="nav-logo">MZ</div>
            <div class="nav-title">
                <span class="nav-title-main">MOVIEZONE</span>
                <span class="nav-title-sub" data-i18n="hero.subtitle">
                Find movies, series & more
            </span>
            </div>
        </a>

        <nav class="nav-center">
            <a href="homepage.html" class="nav-link" data-i18n="nav.home">Home</a>

            <a href="packs.html" class="nav-link" data-i18n="nav.premium_plan">
                Premium Plan
            </a>

            <a href="profile.html"
               class="nav-link nav-link-profile"
               id="profileButton"
               data-i18n="nav.profile">
                Profile
            </a>

            <a href="contact.html"
               class="nav-link active nav-link-contact"
               id="contactButton"
               data-i18n="nav.contact">
                Contact
            </a>

            <div class="lang-dropdown">
                <button class="lang-current" id="langCurrent">
                    <img id="langFlag" src="https://flagcdn.com/w40/gb.png">
                </button>

                <div class="lang-menu" id="langMenu">
                    <div class="lang-item" onclick="changeLanguage('vi')">
                        <img src="https://flagcdn.com/w40/vn.png">
                        <span>Tiếng Việt</span>
                    </div>

                    <div class="lang-item" onclick="changeLanguage('en')">
                        <img src="https://flagcdn.com/w40/gb.png">
                        <span>English</span>
                    </div>
                    <div class="lang-item" onclick="changeLanguage('my')">
                        <img src="https://flagcdn.com/w40/mm.png">
                        <span>မြန်မာဘာသာ</span>
                    </div>

                    <div class="lang-item" onclick="changeLanguage('ja')">
                        <img src="https://flagcdn.com/w40/jp.png">
                        <span>日本語</span>
                    </div>

                    <div class="lang-item" onclick="changeLanguage('de')">
                        <img src="https://flagcdn.com/w40/de.png">
                        <span>Deutsch</span>
                    </div>
                </div>
            </div>
            <div id="notifBellMount"></div>
            <button class="nav-link nav-link-logout"
                    type="button"
                    id="logoutButton"
                    data-i18n="nav.logout">
                Logout
            </button>
        </nav>

        <div class="nav-right">
            <span class="nav-username" id="navUsername"></span>

            <span class="badge-premium" id="premiumBadge" style="display:none;">
            <span class="badge-premium-dot"></span>
            Premium
        </span>
        </div>
    </header>

    <div class="card">
        <div class="title" data-i18n="contact.title">Contact Us</div>

        <form id="contactForm" enctype="multipart/form-data">
            <input type="text" id="name" data-i18n-placeholder="contact.name" placeholder="Your Name" required>
            <input type="email" id="email" data-i18n-placeholder="contact.email" placeholder="Email" required>
            <input type="text" id="phone" data-i18n-placeholder="contact.phone" placeholder="Phone Number">
            <textarea id="content" data-i18n-placeholder="contact.message" placeholder="Message" required></textarea>
            <input type="file" id="images" multiple accept="image/*">

            <button type="submit" data-i18n="contact.send">Send Contact</button>
        </form>

        <div id="message"></div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo">MZ</div>
                <span class="footer-title">MOVIEZONE</span>
            </div>
            <div class="footer-links">
                <a href="homepage.html" data-i18n="nav.home">Home</a>
                <a href="packs.html" data-i18n="nav.premium_plan">Go Premium</a>
            </div>
        </div>
        <div class="footer-bottom" data-i18n="footer.bottom">
            © 2025 MovieZone. Demo Project — Login/Sign Up to experience.
        </div>
    </footer>
</div>
<script src="/js/notification-bell.js"></script>
<script src="/js/i18n.js"></script>
<script src="js/bannerads.js"></script>
<script>

    const token = localStorage.getItem("token");

    // Nếu chưa login -> đá về login
    if (!token) {
        window.location.href = "login.html";
    }

    // ====== HANDLE SUBMIT ======
    document.getElementById("contactForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const btn = this.querySelector("button");
        const msgDiv = document.getElementById("message");
        btn.disabled = true;
        msgDiv.innerHTML = "";

        const formData = new FormData();

        formData.append("name", document.getElementById("name").value);
        formData.append("email", document.getElementById("email").value);
        formData.append("phone", document.getElementById("phone").value);
        formData.append("content", document.getElementById("content").value);

        const files = document.getElementById("images").files;

        for (let i = 0; i < files.length; i++) {
            formData.append("images[]", files[i]);
        }

        try {
            const response = await fetch("/api/contact", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                },
                body: formData
            });

            // Nếu token hết hạn -> đá về login
            if (response.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "login.html";
                return;
            }

            const result = await response.text();

            if (!response.ok) throw new Error(result);

            msgDiv.innerHTML = `<div class="msg">${result}</div>`;
            document.getElementById("contactForm").reset();

        } catch (error) {
            msgDiv.innerHTML =
                `<div class="err">${error.message || "Sending failed!"}</div>`;
        } finally {
            btn.disabled = false;
        }
    });

    async function fetchPremiumInfo() {

        const token = localStorage.getItem("token");

        if (!token) {
            return {
                isLoggedIn: false,
                isPremium: false,
                username: "Guest"
            };
        }

        try {

            const res = await fetch("/api/user/profile", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await res.json();

            const subs = Array.isArray(data.subscriptions) ? data.subscriptions : [];

            const hasActive = subs.some(s => s && s.status === "ACTIVE");

            return {
                isLoggedIn: true,
                isPremium: hasActive,
                username: data.username || localStorage.getItem("username") || "User"
            };

        } catch (e) {

            return {
                isLoggedIn: true,
                isPremium: false,
                username: localStorage.getItem("username") || "User"
            };

        }
    }

    async function initUserUi() {

        const usernameEl = document.getElementById("navUsername");
        const premiumBadge = document.getElementById("premiumBadge");
        const logoutButton = document.getElementById("logoutButton");

        const info = await fetchPremiumInfo();

        if (usernameEl) {
            const shortName = (typeof displayNameFor === 'function')
                ? displayNameFor(info.username)
                : (info.username && info.username.indexOf('@')>0 ? info.username.split('@')[0] : info.username);
            usernameEl.textContent = "👋 " + translations.nav.hello + ", " + shortName;
        }

        if (info.isPremium && premiumBadge) {
            premiumBadge.style.display = "inline-flex";
        }

        if (!info.isLoggedIn && logoutButton) {
            logoutButton.style.display = "none";
        }
    }

    function initLogout() {

        const logoutButton = document.getElementById("logoutButton");

        if (!logoutButton) return;

        logoutButton.addEventListener("click", () => {

            localStorage.removeItem("token");
            localStorage.removeItem("username");

            window.location.href = "login.html";
        });
    }

    document.addEventListener("DOMContentLoaded", async () => {

        await initUserUi();

        initLogout();

    });
</script>
<script src="js/ai-chat-support.js"></script>
</body>
</html>
