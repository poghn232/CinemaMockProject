<div class="card">
    <h2 data-i18n="nav.home">Admin Home</h2>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px">
        <div style="
        background: rgba(255, 255, 255, 0.02);
        padding: 12px;
        border-radius: 8px;
      ">
            <div class="muted" data-i18n="admin.users">Users (non-admin)</div>
            <div id="homeUsers" style="font-weight: 700; font-size: 20px; margin-top: 8px">
                --
            </div>
        </div>
        <div style="
        background: rgba(255, 255, 255, 0.02);
        padding: 12px;
        border-radius: 8px;
      ">
            <div class="muted" data-i18n="admin.packs">Subscription packs</div>
            <div id="homePacks" style="font-weight: 700; font-size: 20px; margin-top: 8px">
                --
            </div>


        </div>
        <div style="
      background: rgba(255, 255, 255, 0.02);
      padding: 12px;
      border-radius: 8px;
    ">
            <div class="muted" data-i18n="admin.films">Published Films</div>
            <div id="homeMovies" style="font-weight: 700; font-size: 20px; margin-top: 8px">
                --
            </div>

        </div>
    </div>


    <button class="btn" onclick="window.adminApi.loadFragment('admin_users.html')" data-i18n="admin.manage_users">>
        Manage Users
    </button>

    <button class="btn ghost" onclick="window.adminApi.loadFragment('admin_packs.html')" data-i18n="admin.manage_packs">
        Manage Packs
    </button>

    <button class="btn" onclick="window.adminApi.loadFragment('admin_movies.html')" data-i18n="admin.manage_films">
        Manage Films
    </button>
<!-- Fragment script executed after this HTML is loaded -->
    <script data-fragment-script>
        (async function () {
            const { fetchJson, api } = window.adminApi;
            try {// Fetch data from admin APIs
                const users = (await fetchJson(api.users)) || [];
                const packs = (await fetchJson(api.packs)) || [];
                const movies = (await fetchJson(api.movies)) || [];
                // Count only non-admin users
                document.getElementById("homeUsers").textContent = users.filter(
                    (u) => u.role !== "ADMIN",
                ).length;
                document.getElementById("homePacks").textContent = packs.length;

                document.getElementById("homeMovies").textContent = movies.length;
            } catch (e) {
                console.error(e);
            }
        })();
    </script>
</div>
