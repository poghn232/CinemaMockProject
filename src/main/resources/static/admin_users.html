<div class="card">
  <h2 data-i18n="admin.users">Users</h2>
  <div class="muted" data-i18n="admin.user_toggle">Use the switch to allow or prevent a user from commenting (ON = comments allowed)</div>
  <div style="display: flex; gap: 8px; margin-top: 12px; align-items: center">
    <input
      id="userSearch"
      type="text"
      data-i18n-placeholder="admin.search_user"
      placeholder="Search by username or email"
      style="flex: 1; padding: 8px; border-radius: 8px"
    />
    <select id="userSortField" style="padding: 8px; border-radius: 8px">
      <option value="username" data-i18n="profile.username">Username</option>
      <option value="role" data-i18n="profile.username">Role</option>
      <option value="commentDisabled" data-i18n="admin.enabled">Commenting disabled</option>
    </select>

    <button id="userSortDir" class="btn ghost" data-dir="asc">↑</button>
  </div>
  <div id="users" class="users-list" style="margin-top: 12px"  data-i18n="common.loading">Loading...</div>
  <style>
    /* small fragment-local styles to match project badges/layout */
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#2b2f42;color:#fff;font-size:12px}
    .badge.premium{background:linear-gradient(90deg,#f97316,#ef4444);box-shadow:0 2px 8px rgba(239,68,68,0.12)}
    .profiles-list{display:flex;flex-direction:column;gap:8px;padding:8px}
    .profile-row{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);}
    .profile-meta{font-size:14px}
    .profile-actions{display:flex;gap:8px;align-items:center}
    .profile-actions .badge{font-size:12px;padding:3px 7px}
  </style>
  <!-- Profiles modal (hidden by default) -->
  <div id="profilesModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:9999">
  <div style="background:var(--card-bg,#0b1220); color:var(--card-color,#fff); width:720px; max-width:95%; border-radius:8px; padding:16px; box-shadow:0 6px 18px rgba(2,6,23,0.6);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="profilesModalTitle">Profiles</h3>
        <button id="closeProfilesModal" class="btn ghost">Close</button>
      </div>
      <div id="profilesModalBody" style="margin-top:12px; max-height:60vh; overflow:auto">Loading...</div>
    </div>
  </div>
  <div
    id="userPagination"
    style="margin-top: 12px; display: flex; gap: 8px; align-items: center"
  ></div>
</div>

<script data-fragment-script>
  (async function () {
    const { fetchJson, api } = window.adminApi;
    let usersCache = [];
    let currentPage = 1;
    const pageSize = 5;

    function renderUsers() {
      const container = document.getElementById('users');
      const q = (document.getElementById('userSearch').value || '').toLowerCase().trim();

      let list = (usersCache || []).slice();
      if (q) {
        list = list.filter(u => (u.username || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q));
      }

      const field = document.getElementById('userSortField').value;
      const dir = document.getElementById('userSortDir').dataset.dir;
      if (field === 'username') list.sort((a,b) => (a.username||'').localeCompare(b.username||''));
      else if (field === 'role') list.sort((a,b) => (a.role||'').localeCompare(b.role||''));
      else if (field === 'commentDisabled') list.sort((a,b) => (a.commentDisabled?1:0) - (b.commentDisabled?1:0));
      if (dir === 'desc') list.reverse();

      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      if (currentPage > totalPages) currentPage = 1;
      const start = (currentPage - 1) * pageSize;
      const paginatedList = list.slice(start, start + pageSize);

      container.innerHTML = '';
      paginatedList.forEach(u => {
        const row = document.createElement('div');
        row.className = 'user-row';

        const meta = document.createElement('div');
        meta.className = 'user-meta';
        meta.innerHTML = `<div class="user-name">${u.username || ''} <span class="muted">(${u.role || ''})</span></div><div class="user-email">${u.email || ''}</div>`;

  const profilesBtn = document.createElement('button');
        profilesBtn.className = 'btn ghost';
        profilesBtn.textContent = 'Profiles';
        profilesBtn.addEventListener('click', () => openProfilesModal(u.userId, u.username));

  // User-level premium badge (show if any active subscription)
  const userPremium = document.createElement('span');
  userPremium.className = u.premium ? 'badge premium' : 'badge';
  userPremium.textContent = u.premium ? 'Premium' : 'Free';

      // user-level toggle removed — profile-level controls are used instead

  const actions = document.createElement('div');
  actions.style.display = 'flex'; actions.style.gap = '8px';
  actions.appendChild(userPremium);
  actions.appendChild(profilesBtn);

        row.appendChild(meta); row.appendChild(actions); container.appendChild(row);
      });

      // pagination
      const pagination = document.getElementById('userPagination');
      pagination.innerHTML = '';
      if (totalPages > 1) {
        const prev = document.createElement('button'); prev.className='btn ghost'; prev.textContent='Prev'; prev.disabled = currentPage===1; prev.onclick = () => { currentPage--; renderUsers(); };
        const info = document.createElement('span'); info.textContent = `Page ${currentPage} of ${totalPages}`;
        const next = document.createElement('button'); next.className='btn ghost'; next.textContent='Next'; next.disabled = currentPage===totalPages; next.onclick = () => { currentPage++; renderUsers(); };
        pagination.appendChild(prev); pagination.appendChild(info); pagination.appendChild(next);
      }
    }

    async function loadUsers() {
      const container = document.getElementById('users');
      container.innerHTML = 'Loading...';
      try {
        usersCache = (await fetchJson(api.users)) || [];
        renderUsers();
      } catch (e) {
        container.innerHTML = 'Failed to load users';
        console.error(e);
      }
    }

    // search & sort listeners
    document.getElementById('userSearch').addEventListener('input', () => renderUsers());
    document.getElementById('userSortField').addEventListener('change', renderUsers);
    document.getElementById('userSortDir').addEventListener('click', function(){ const cur=this.dataset.dir; const next = cur==='asc'?'desc':'asc'; this.dataset.dir = next; this.textContent = next==='asc'?'↑':'↓'; renderUsers(); });

    // Profiles modal helpers
    const profilesModal = document.getElementById('profilesModal');
    const profilesModalBody = document.getElementById('profilesModalBody');
    const profilesModalTitle = document.getElementById('profilesModalTitle');
    document.getElementById('closeProfilesModal').addEventListener('click', () => { profilesModal.style.display='none'; profilesModalBody.innerHTML=''; });

    async function openProfilesModal(userId, username) {
      profilesModalTitle.textContent = `Profiles for ${username || ''}`;
      profilesModalBody.innerHTML = 'Loading...';
      profilesModal.style.display = 'flex';
      try {
        const profiles = await fetchJson(api.users + '/' + userId + '/profiles');
        renderProfilesList(profiles || [], userId);
      } catch (e) {
        profilesModalBody.innerHTML = 'Failed to load profiles: ' + e;
      }
    }

    function renderProfilesList(profiles, userId) {
      if (!profiles || profiles.length === 0) { profilesModalBody.innerHTML = '<div class="muted">No profiles found for this user.</div>'; return; }
      const list = document.createElement('div');
      list.className = 'profiles-list card';
      profiles.forEach(p => {
        const item = document.createElement('div');
        item.className = 'profile-row';
        // left: info
        const left = document.createElement('div');
        left.className = 'profile-meta';
        left.innerHTML = `<div style="font-weight:600">${p.profileName || p.profileId}</div><div class="muted">ID: ${p.profileId}</div>`;
  // right: toggle only (premium shown at user level)
  const right = document.createElement('div');
  right.className = 'profile-actions';
        const profToggle = document.createElement('div');
        profToggle.className = 'toggle' + (!p.commentDisabled ? ' on' : '');
        const profKnob = document.createElement('div'); profKnob.className='knob'; profToggle.appendChild(profKnob);
        profToggle.addEventListener('click', async () => {
          try {
            const newDisabled = !p.commentDisabled;
            const updated = await fetchJson(api.users + '/profiles/' + p.profileId + '/comment-disabled', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newDisabled) });
            p.commentDisabled = Boolean(updated && updated.commentDisabled);
            renderProfilesList(profiles, userId);
            window.adminApi.refreshCounts();
          } catch (e) { alert('Error toggling profile: ' + e); }
        });
        right.appendChild(profToggle);
        item.appendChild(left);
        item.appendChild(right);
        list.appendChild(item);
      });
      profilesModalBody.innerHTML=''; profilesModalBody.appendChild(list);
    }

    await loadUsers();
  })();
</script>
