<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Xác nhận IP công khai | MovieZone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #020617;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            width: 420px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.4);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 11px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .msg {
            margin-top: 12px;
            color: #fca5a5;
            min-height: 18px;
            font-size: 13px;
        }

        .ok {
            color: #86efac;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Xác nhận khu vực truy cập</h2>
    <p>
        Hệ thống đang tự động lấy IP công khai của bạn để xác định khu vực truy cập.
    </p>

    <button id="retryBtn" style="display:none;">Thử lại</button>
    <div class="msg" id="msg">Đang lấy IP công khai...</div>
</div>

<script>
    async function getPublicIp() {
        // ipify trả về JSON public IP
        const res = await fetch("https://api.ipify.org?format=json");
        if (!res.ok) {
            throw new Error("Không lấy được public IP từ ipify");
        }

        const data = await res.json();
        return data.ip;
    }

    async function submitPublicIp(ip) {
        const token = localStorage.getItem("token");

        const res = await fetch("/api/auth/resolve-region", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ publicIp: ip })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.message || "Không thể xác định khu vực");
        }

        return data;
    }

    async function autoResolveRegion() {
        const msg = document.getElementById("msg");
        const retryBtn = document.getElementById("retryBtn");

        try {
            msg.textContent = "Đang lấy IP công khai...";
            const publicIp = await getPublicIp();

            msg.textContent = "Đã lấy IP: " + publicIp + ". Đang xác định khu vực...";

            const data = await submitPublicIp(publicIp);

            localStorage.setItem("token", data.token);
            localStorage.setItem("region", data.region || "");
            localStorage.setItem("role", data.role || "");

            msg.textContent = "Xác định khu vực thành công. Đang chuyển trang...";
            msg.classList.add("ok");

            const role = (data.role || "").toUpperCase();
            if (role.includes("ADMIN")) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "choose_profile.html";
            }

        } catch (e) {
            msg.textContent = e.message || "Có lỗi xảy ra khi xác nhận IP.";
            retryBtn.style.display = "block";
        }
    }

    document.getElementById("retryBtn").addEventListener("click", () => {
        document.getElementById("retryBtn").style.display = "none";
        autoResolveRegion();
    });

    autoResolveRegion();
</script>
</body>
</html>
