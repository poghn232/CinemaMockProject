<div class="card">
  <h2>Films</h2>
  <div class="muted">
    Quản lý danh sách phim được hiển thị trên trang chính. Dùng Add để import
    từ TMDB, Hide để ẩn phim đã xuất bản.
  </div>

  <!-- ADD FROM TMDB -->
  <div
    style="
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      flex-direction: column;
      gap: 8px;
    "
  >
    <div style="font-weight: 600">Add film from TMDB</div>
    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap">
      <input
        id="tmdbIdInput"
        type="number"
        placeholder="TMDB ID (ví dụ: 603692)"
        style="flex: 1; min-width: 180px; padding: 8px; border-radius: 8px"
      />
      <select
        id="tmdbTypeInput"
        style="padding: 8px; border-radius: 8px; min-width: 120px"
      >
        <option value="movie">Movie</option>
        <option value="tv">TV Series</option>
      </select>
      <button id="tmdbAddButton" class="btn">Add</button>
    </div>
    <div id="tmdbAddMessage" class="muted"></div>
  </div>

  <!-- LIST / HIDE -->
  <div
    style="
      margin-top: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    "
  >
    <input
      id="filmSearch"
      type="text"
      placeholder="Search by title..."
      style="flex: 1; min-width: 200px; padding: 8px; border-radius: 8px"
    />
    <button id="refreshFilms" class="btn ghost">Reload</button>
  </div>

  <div id="filmsList" class="packs" style="margin-top: 12px">Loading...</div>
</div>

<script data-fragment-script>
  (async function () {
    const { fetchJson, api, refreshCounts } = window.adminApi;
    let filmsCache = [];

    function renderFilms() {
      const container = document.getElementById("filmsList");
      const q = (document.getElementById("filmSearch").value || "")
        .toLowerCase()
        .trim();

      let list = (filmsCache || []).slice();

      if (q) {
        list = list.filter((f) =>
          (f.title || "").toLowerCase().includes(q),
        );
      }

      if (!list.length) {
        container.innerHTML = "No films found.";
        return;
      }

      list.sort((a, b) => (a.title || "").localeCompare(b.title || ""));

      container.innerHTML = "";

      list.forEach((f) => {
        const row = document.createElement("div");
        row.className = "pack-row";

        const info = document.createElement("div");
        const typeLabel = f.type === "tv" ? "TV Series" : "Movie";
        const status = f.published ? "Published" : "Hidden";

        info.innerHTML = `
          <div style="font-weight:600">${f.title}</div>
          <div class="muted">${typeLabel} · ${status}</div>
        `;

        const actions = document.createElement("div");

        const hideBtn = document.createElement("button");
        hideBtn.className = "btn ghost";
        hideBtn.textContent = f.published ? "Hide" : "Hidden";
        hideBtn.disabled = !f.published;

        hideBtn.addEventListener("click", async () => {
          if (!confirm("Ẩn phim này khỏi trang chính?")) return;
          try {
            await fetchJson(api.movies + "/" + f.type + "/" + f.id + "/hide", {
              method: "PUT",
            });
            await loadFilms();
            refreshCounts();
          } catch (e) {
            alert("Hide failed: " + e);
          }
        });

        actions.appendChild(hideBtn);

        row.appendChild(info);
        row.appendChild(actions);
        container.appendChild(row);
      });
    }

    async function loadFilms() {
      const container = document.getElementById("filmsList");
      container.innerHTML = "Loading...";
      try {
        filmsCache = (await fetchJson(api.movies)) || [];
        renderFilms();
      } catch (e) {
        container.innerHTML = "Failed to load films.";
        console.error(e);
      }
    }

    document
      .getElementById("filmSearch")
      .addEventListener("input", renderFilms);
    document
      .getElementById("refreshFilms")
      .addEventListener("click", loadFilms);

    document
      .getElementById("tmdbAddButton")
      .addEventListener("click", async () => {
        const idInput = document.getElementById("tmdbIdInput");
        const typeInput = document.getElementById("tmdbTypeInput");
        const msg = document.getElementById("tmdbAddMessage");

        const rawId = idInput.value.trim();
        const type = typeInput.value;

        if (!rawId) {
          msg.textContent = "Vui lòng nhập TMDB ID.";
          return;
        }

        const tmdbId = parseInt(rawId, 10);
        if (!tmdbId || tmdbId <= 0) {
          msg.textContent = "TMDB ID không hợp lệ.";
          return;
        }

        msg.textContent = "Đang import từ TMDB...";

        try {
          await fetchJson(api.movies + "/import", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tmdbId, type }),
          });
          msg.textContent = "Import thành công. Phim đã được publish.";
          idInput.value = "";
          await loadFilms();
          refreshCounts();
        } catch (e) {
          msg.textContent = "Import thất bại: " + e;
        }
      });

    await loadFilms();
  })();
</script>
